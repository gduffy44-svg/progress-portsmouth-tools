ner knows this!"},{"t":"quote","text":"We are still here and have not gone yet, but we may if the going gets any tougher and then you will have a city with pretty parks, pretty trees, nice sidewalks, theatres, pedestrian malls, all the aesthetics, but alas, no people!","attr":""}]},{"id":"a6","kicker":"Portsmouth Herald &middot; March 8, 1977","title":"Citizens' Desires Dictate City Direction","by":"By <strong>Raymond Richardson</strong>, Director, Portsmouth Economic Commission","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This is another article in the study series entitled &ldquo;Portsmouth at the Crossroads.&rdquo; It is authored by Raymond J. Richardson, director of the Portsmouth Economic Commission, and deals with &ldquo;The Changing Economic Fortunes of Portsmouth.&rdquo;)</em>"},{"t":"p","text":"Where is Portsmouth going economically is the question we have been asked to address here. In reality, Portsmouth can go in any direction it pleases&mdash;forward&mdash;backward or simply maintain the status quo. It all depends upon the desires of its citizens."},{"t":"p","text":"Nothing can be more humanistically oriented than that. For years, Portsmouth was overly dependent upon governmental installations as the mainstay of the local economy. Not until the Portsmouth Naval Shipyard was threatened with closure were affirmative steps taken locally to diversify the area&rsquo;s economy."},{"t":"p","text":"But, when the need arose, it was people and local initiative that rose to the occasion in two major forms."},{"t":"p","text":"First, the Portsmouth-Kittery Armed Services Committee was established to acquaint Washington with the value of maintaining the shipyard. Secondly, the Portsmouth Regional Development Corporation (PRDC) was founded to foster and encourage industrial development and job diversification in the area. PRDC was comprised of numerous private individuals in the community who risked their own money for development of Borthwick Park in behalf of the community."},{"t":"p","text":"These two events represented a threshold in Portsmouth&rsquo;s modern or recent economic history. For the first time in many years, Portsmouth businessmen and residents determined not to sit idly by and let outside factors influence their economy or decide their fate, but resolved to work locally to improve the situation. They did this by working strenuously in Washington for retention of the shipyard and initiated development of Borthwick Park to guide and encourage new industrial development."},{"t":"p","text":"Around 1965, it was realized that the threatened closure of the shipyard was so enormous in its ramifications that it wasn&rsquo;t only the problem of a few businessmen or employees of the shipyard but the entire community&rsquo;s problem. Hence, the Portsmouth Economic Commission was established."},{"t":"p","text":"Another way of interpreting this action is that for the first time economic development was recognized in Portsmouth by the majority of its citizens as being in the public interest, worthy of public support through tax dollars. Again, we see Portsmouth people through their City Council, deciding their own economic fate and electing to take the initiative."},{"t":"p","text":"In the interim since its inception, Portsmouth has been very successful at attracting industry when compared to most communities across the country. Industrial development, which the Economic Commission is engaged in, is an extremely accountable endeavor where success or failure is readily apparent. At the end of a given length of time, you either have new firms and manufacturing facilities or you don&rsquo;t."},{"t":"p","text":"Portsmouth can point with pride to Newlab Instruments, Diaphragm Industries, Booth Fisheries, Liberty Mutual, Data General, Damart Thermawear, Post Machinery and more recently Rani-Merona as firms that have moved here largely under the auspices of the Economic Commission."},{"t":"p","text":"These firms collectively have introduced 1,872 jobs to this area with still another 650 to be filled by the two newest firms in Portsmouth during the next couple years. These employment opportunities benefit not only the unemployed but the employed as well."},{"t":"p","text":"Few things are more depressing than economically deprived areas with high unemployment. Crime, alcoholism, family strife and neighborhood neglect are only some of the characteristics of economically depressed areas and affect everyone of us, not just the unemployed."},{"t":"p","text":"More recently, economic development, specifically industrial, is being looked upon as a means of broadening the city&rsquo;s tax base and lessening the burden on the average citizen. As long as Portsmouth controls its residential development, fosters commercial and industrial growth and exercises restraint in spending, we can narrow the gap in the tax base. However, this direction will largely be determined again by the citizenry. The City Administration and Council are often criticized as the cause for excessive spending resulting in ever increasing taxes."},{"t":"p","text":"Yet, City Councils and government must respond to the demands of their constituency."},{"t":"p","text":"It is continued demands for municipal services by various groups, organizations and residents of Portsmouth that are as much responsible for increasing taxes as anything else. Portsmouth often points to surrounding towns with lesser tax rates, contending that we provide many of their services without just compensation."},{"t":"p","text":"Indeed many inequities exist. However, what we fail to recognize is that their taxes are often lower because their citizens are content with fewer services such as sidewalks, recreation facilities, police and fire protection."},{"t":"p","text":"People in urban areas generally demand and expect more services. The only problem is that these services necessarily require higher taxes."},{"t":"p","text":"Therefore, Portsmouth residents themselves will influence largely the shape of the local tax structure which will indirectly affect the local economy."},{"t":"p","text":"Portsmouth is indeed at a crossroads relative to a number of projects that can benefit our local economy, should we decide to pursue them today. However, the decisions are largely up to the citizens of Portsmouth to make."},{"t":"p","text":"Unfortunately, some of the projects to be decided upon require expenditures today without immediate effects."},{"t":"p","text":"Therefore, they often tend to be unpopular to some degree. The new Portsmouth Industrial Park is an example of one already decided upon by the citizens of Portsmouth through the public hearing process, Citizens&rsquo; Council, City Council, Planning Board, Conservation and Economic commissions. In this instance, we resisted the temptation to spend $300,000 on projects that might have more immediate results, such as sidewalks. We invested it instead in a longer range, more speculative project that ultimately will return the $300,000 back to the community and many times more than that in the form of jobs and taxes. In so doing, Portsmouth acknowledged the same principle that guides all businesses, i.e., in order to make money, you have to invest money. This takes commitment, and Portsmouth, by funding this project, committed itself to economic growth."},{"t":"p","text":"Other tough decisions facing us include, for example, rehabilitating our Central Business District. We can sit by and watch it deteriorate further or we can take some initiative, invest some money, use some creativity and commit ourselves toward enhancing it."},{"t":"p","text":"Tourism represents another decision for Portsmouth. We have not yet begun to tap Portsmouth&rsquo;s potential for tourism and its beneficial effects on our economy. However, tourism to be maximized properly will require further commitment, funds for promotion and coordination on behalf of our tourist sector. The end result, as other communities have found, will be benefits many times the return on our investment."},{"t":"p","text":"Obviously, other factors such as the national and state economies, energy crises, etc., will exert varying degrees of influence on Portsmouth&rsquo;s local economy. However, in the final analysis Portsmouth&rsquo;s future will be largely determined by its citizens. Whether we go ahead, backward or stay the same is up to all of us."}]},{"id":"a7","kicker":"Portsmouth Herald &middot; March 10, 1977","title":"Rich Dividends Have Been Won by Change","by":"By <strong>George K. Romoser</strong>, Professor of Political Science, UNH","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This is the final article in the series on Portsmouth at the Crossroads, a project studying Portsmouth&rsquo;s future, with different viewpoints on same. A series of workshops will follow beginning March 16. The final article is by Dr. George K. Romoser, one of the project directors.)</em>"},{"t":"p","text":"We of the Western world have lived with change for a long time. Centuries ago now, a dynamic process of development started in what is today the modern industrialized part of the globe. Constant technological discovery has gone along with freedom for economic gain and personal mobility no less than with freedom of opinion and religious belief."},{"t":"p","text":"The &ldquo;world became our oyster&rdquo; rather than remaining a stubborn fate which we could do little to change or improve. Change has meant trying new things, looking on the world as something we can influence."},{"t":"p","text":"Rich dividends have been won; from vastly improved health and education to comforts which were unheard of except for the very few in earlier civilizations (and are still out of reach for vast millions in other parts of the world today). Despite differences between wealthy and poor in our West European&ndash;North American industrial world, we are all products of these changes. Most of us have benefited from them in some way."},{"t":"p","text":"Portsmouth, no less than any community in this complex civilization, is exposed to the dynamics of change&mdash;its stresses as well as its benefits."},{"t":"h","text":"Stress of Change"},{"t":"p","text":"That change also brings with it stresses, disagreements, and dilemmas is by now a common observation, confirmed by our everyday experience (which may include attending meetings of governmental bodies!) Perhaps it&rsquo;s more accurate to say that rapid change increases the potential for stress because the stakes involved in each decision become higher&mdash;any particular change has wider implications than in slower-paced civilizations."},{"t":"p","text":"Some say change has wildly accelerated in our own day&mdash;since World War II, or perhaps in this century&mdash;at a pace unusual even for the Western world. If so, this pace only makes more obvious the problems created by our civilization&rsquo;s dynamic&mdash;along with its benefits."},{"t":"p","text":"Change is stressful, first of all, because what we change in one dimension may cause other changes which we are not prepared to accept. We may either be against such &ldquo;spinoffs&rdquo; or unable to predict the impact of a change in one dimension of our lives."},{"t":"p","text":"For instance, the postwar interstate highway system has spun off all sorts of side effects. It has been glorious for contractors, satisfying for military planners concerned with movement of men and weapons in times of emergency, and useful for &ldquo;making jobs.&rdquo; It is also satisfying to be able to move nimbly from one place to another on comfortable highways."},{"t":"p","text":"But such highways have also caused residential, industrial, and commercial sprawl, affected work and shopping habits, and in many cases forced changes on communities ill-prepared or unwilling to deal with them."},{"t":"p","text":"Somehow, most of us probably want to combine maximum options and advantages for ourselves&mdash;requiring for this a dynamic and changing community which effectively manages things&mdash;with the sense of calmness and permanence which comes from living our everyday lives as we&rsquo;ve gotten used to living them. We want dynamism because it increases our freedom and may give us gains, and yet we cling to the familiar. We may want to eat our cake, and have it too."},{"t":"h","text":"Effective and Stable"},{"t":"p","text":"In a world in which there are thousands of pressures for change, some communities may be unsuccessful both in effective management and use of changing conditions, and in assuring some sense of permanence. They may simply be bypassed or become anonymous blobs of territory in a sea of random sprawl."},{"t":"p","text":"Other communities may be reasonably effective in coping with the technical impacts of change, but may lose their real life in the process. Such towns may even be reasonably well off, and yet the life there may be glossy, superficial and without roots. People may move in and out as residents or tourists without forming any real attachments to the community."},{"t":"p","text":"I suppose it was this latter style of town which Evelyn Marconi objected to in her recent article in this &ldquo;Crossroads&rdquo; series. The concern and threat deserve to be taken seriously, even though there are certainly well-founded disagreements about whether Portsmouth is, in fact, leaning in this direction."},{"t":"p","text":"Signs are that communities face increasing problems in combining dynamic and effective growth with stable conditions for the average citizen. Oil and other resource problems limiting growth and opportunities&mdash;or, at least, calling forth more governmental controls&mdash;press upon us. Communities are engaged in almost frantic efforts to raise revenues for the services demanded, and some of the tax decisions made cannot help but affect deeply the style of life in a town&mdash;perhaps there will be new services and conveniences, but the town may be threatened in its roots and its center."},{"t":"h","text":"Attempt at Overview"},{"t":"p","text":"The key question remains that of combining effectiveness in managing change with a satisfying style of everyday life for the citizen. In trying to understand how we can do this, and what we have to take into account, we can be sure of certain things, even if no simple answers are possible."},{"t":"p","text":"First, since change is so much a part of our way of life, we see that there is no one point in the history of change at which we make a permanent stop. Those who talk of &ldquo;the good old days&rdquo; may not always have their facts correct, or may just be looking at the past through rose-colored glasses. Beyond that, they may really be saying change should &ldquo;stop&rdquo; at a certain point, without telling us how."},{"t":"p","text":"Second, we see that there can be no exclusive claims which can determine fundamental issues about the future of a community."},{"t":"p","text":"It is not just economic development which should guide decisions, not just historic preservation or resurrection (of a real or imagined past), not just cultural opportunities, not just expert professional management, not just the self-contained values of the &ldquo;old Portsmouthians,&rdquo; but certainly not just the supposedly &ldquo;sophisticated&rdquo; tastes of the &ldquo;newcomers&rdquo;&mdash;frequently urban or suburban expatriates&mdash;either."},{"t":"p","text":"Above all, every community must listen with great skepticism to those who claim that this or that step &ldquo;is supported by the people,&rdquo; without evidence that the people have really been given an opportunity to digest and think through the impact of various choices. The &ldquo;Portsmouth at the Crossroads&rdquo; project is designed to make a modest contribution to this &ldquo;thinking through&rdquo; of issues by the ordinary citizen."},{"t":"h","text":"Project and Workshops"},{"t":"p","text":"The community has many dimensions, many parts. For the community to survive and to combine effectiveness and stability, decisions must reflect this diversity. That diversity, in turn, must be given an opportunity to be expressed."},{"t":"p","text":"But does not Portsmouth already have a variety of official, semi-official and voluntary groups engaged in discussing these very problems? True enough. The Portsmouth Crossroads Project is no substitute for these ongoing groups."},{"t":"p","text":"Instead, the Project encourages citizens to step back for a time from these ongoing activities (without forgetting their purposes) and to think in common about the values, goals, and dilemmas of the community in a thoroughly non-partisan but still tough-minded way. In the words of the sponsoring agency, the New Hampshire Council for the Humanities, which is part of a nationwide effort in each state, the aim is &ldquo;to involve citizens in a close examination of the value judgements necessary in formulating public policy affecting&mdash;and effecting&mdash;change.&rdquo;"},{"t":"h","text":"Uninvolved Citizen?"},{"t":"p","text":"It will be especially significant that citizens not regularly involved in official or voluntary community groups will be involved in the Portsmouth Crossroads Project. At each public workshop, beginning March 16 at 7:30 p.m. in the Portsmouth Library, and continuing every other Wednesday at the same time through May 25, citizens are asked to think about issues of change in their everyday lives&mdash;how do and might changes affect me?&mdash;and to pose tough questions to one another and to the panelists. The panelists and the project directors will be simply there to kick off the discussion and to insure that everyone has his say."},{"t":"p","text":"In fact, this is what the Crossroads Project is all about: how can you figure out what happens to your everyday life as Portsmouth changes?"}]},{"id":"m1","kicker":"First Public Meeting &middot; March 16, 1977","title":"Tourism and Community Identity","kind":"meeting","num":"I","panelists":["Arthur Brady","David Cordeau","Alfonso Cabrera","Robert Chase"],"place":"Portsmouth Public Library &middot; March 16, 1977","blocks":[{"t":"figure","caption":"View from the North Tower of Piscataqua River Bridge — industrial Portsmouth waterfront","credit":"Strawbery Banke, Inc., Portsmouth, NH","src":"images/img05.jpg"},{"t":"p","text":"The first workshop in the &ldquo;Portsmouth at the Crossroads&rdquo; project was concerned with the problem of maintaining a sense of belonging, commitment, and collective identity in the face of pressures for social and economic change which could undermine community spirit. More specifically, the increasing emphasis on tourism in Portsmouth, especially since the development of Strawbery Banke, was discussed in terms of its actual and potential impact on the city&rsquo;s ability to maintain its unique sense of community and its small town feeling."},{"t":"p","text":"In order to address systematically this concern, Panelists Arthur Brady (proprietor of Brady Ford, Inc., former Mayor, and Board Chairman of Strawbery Banke), David Cordeau (Executive Vice-President, Greater Portsmouth Chamber of Commerce), Alfonso Cabrera (proprietor, Al&rsquo;s Barber Shop), and Robert Chase (consultant and property owner in Portsmouth and Newburyport) discussed the following three specific questions:"},{"t":"p","text":"The following report examines each of these separately in order to identify the major points of community agreement and disagreement revealed at the meeting."},{"t":"h","text":"1. What are the benefits of tourism?"},{"t":"p","text":"On the answer to this question there was substantial agreement. Most participants were convinced that tourism provides considerable economic advantage to Portsmouth and the seacoast region. Panelist Cordeau indicated that tourism accounted for 18% of seacoast area wages and 12% of seacoast area jobs. In Portsmouth alone, those who owe their income, at least in part, to tourists include: employees of Strawbery Banke and the city&rsquo;s historic mansions; the proprietors and employees of the city&rsquo;s specialty shops and restaurants; the artists and administrative staffs associated with Theatre by the Sea, the Chamber Music Ensemble, and the Prescott Park Arts Festival; and many of the city&rsquo;s artists, artisans, and craftsmen. Beyond these specific beneficiaries, it seems apparent that the economic well-being of Portsmouth in general benefits from the influx of tourist dollars."},{"t":"p","text":"To such obvious economic advantages should also be added the benefits of cosmopolitanism which result from the temporary influx of a more urbanized population. These benefits include the presence of specialty shops, gourmet restaurants, and artisans who could not ordinarily be sustained by a small community alone, but who are underwritten in large part by tourist dollars."},{"t":"p","text":"Finally, tourists were said to be an advantage because they do not increase the economic burdens associated with community residence. That is, the tourist enters the community, spends money, and leaves, but does not demand a large quantity of new or additional services such as water, sewage disposal, schools, and police/fire protection. As one member of the audience noted, &ldquo;The tourist is worth two bales of cotton and twice as easy to pick.&rdquo;"},{"t":"h","text":"2. Who receives these benefits?"},{"t":"p","text":"In relation to this question, the first hint of serious disagreement about tourism was revealed. While all agreed that Portsmouth benefits economically from tourism (as is obvious from the above figures and examples), the disagreements were more subtle. Thus, one member of the audience was not convinced of the benefits of cosmopolitanism suggested above. Only that segment of the community which is sufficiently affluent and cosmopolitan to start with is in a position to appreciate the goods provided by specialty shops and the cuisine available at the city&rsquo;s finer restaurants. Others are left out and may find themselves complaining that the city&rsquo;s merchants and restaurants no longer serve their more mundane and practical needs. This group described itself with such words as &ldquo;left out,&rdquo; &ldquo;neglected,&rdquo; &ldquo;excluded.&rdquo; Most important, they feel excluded from decisions about community change in general and tourism in particular."},{"t":"p","text":"Panelist Cordeau noted that among some people,"},{"t":"p","text":"Although the alleged requirement of a large contribution was never supported by evidence, the fact remains that there is a vocal group of citizens who believe Mr. Cordeau&rsquo;s statement to be true."},{"t":"p","text":"To the extent that these people are aware of themselves as a group, they call themselves the &ldquo;natives&rdquo; and distinguish themselves from newcomers who are sometimes disparagingly referred to as &ldquo;carpetbaggers.&rdquo; While it is true that most of the people who feel this way have lived in Portsmouth for many years and even generations, the term &ldquo;natives&rdquo; is imprecise, for there are certainly a number of long-time residents who participate in and support the changes now occurring in Portsmouth. Moreover, as Panelist Arthur Brady observed, there could be questions raised about the longevity of residence necessary if one is to be certified as a native:"},{"t":"p","text":"While the term &ldquo;native&rdquo; came up again and again in the Crossroads Project, and therefore will be used in this report, we must bear in mind that what is really meant has less to do with length of time in Portsmouth than with the values and preferences of particular individuals. The precise content of these values was never made entirely clear, but they are certainly different from those of the prime movers behind community change. Moreover, members of this group do not feel they are in a strong position to influence the values of the community in general. Most consider themselves working people who do not have the free time and related income to participate in community activities. One spokesperson for this position explained the problem this way:"},{"t":"p","text":"While this statement is probably accurate, it identifies an age-old problem not susceptible to easy solution. Every community past and present is divided by social and economic factors. Where identification with social class or group exceeds identification with the community, the community falls apart. However, where a sense of community is strong, attachment to social class and/or interest group may be secondary. Might not, in such a community, decisions be beneficial to all? Panelist Robert Chase, for example, argued that &ldquo;A community can be enjoyed by anyone. I don&rsquo;t think anyone has to take over.&rdquo;"},{"t":"h","text":"3. Do these benefits compensate for possible losses in community identity?"},{"t":"p","text":"The above discussion of who benefits most from tourism in Portsmouth suggests that threats to community identity come less from tourism itself than from internal divisions within the community about a number of issues, including tourism. Indeed, Panelist Al Cabrera suggested that, far from threatening the sense of community, tourism <em>per se</em> has made Portsmouth more aware of its identity&mdash;it has strengthened community identity. Because tourists are attracted by Portsmouth&rsquo;s fine old homes, accomplished artisans, and maritime atmosphere, the residents of the community have found something in which to take pride and with which to identify. Community residents have become more aware of Portsmouth as a corporate entity, a historical community which has weathered the winds of time and withstood numerous economic vicissitudes."},{"t":"p","text":"While Mr. Cabrera&rsquo;s suggestion has great merit, especially because it questions the extent to which tourism and community identity should be viewed as opposites, for our purposes, it is more useful to view tourism as one facet of the <em>changing</em> identity of Portsmouth. Only a decade or two ago Portsmouth was identified by some outsiders as a somewhat run down city, well past its economic prime, known primarily for its bars and other sailors&rsquo; haunts. Today it is known for Strawbery Banke, its historical heritage, its artists and craftsmen, and its restaurants&mdash;all of which attract tourists to the city."},{"t":"p","text":"While this physical change is apparently a benefit, other accompanying changes in the city are less so. For some old-time residents, identification with the one-time Puddle Dock neighborhood in the south end has died very hard and been replaced, not by identification with the new Portsmouth, but by fond memories, photos in an album, and considerable bitterness. However, most newcomers see change as a positive step toward the revitalization of a wonderful old town which had slid precariously far from its former dignity."},{"t":"p","text":"The old-timer sense of identity is primarily nostalgic, and one former resident of Puddle Dock suggested that it should be replaced by a more positive and forward-looking attitude about the community:"},{"t":"p","text":"In short, the old community identity is a thing of the past and should be accepted as such. While the displacement of Puddle Dock deprived the city of something good, its consequences have not been all bad. Rather, the vacuum left by the demise of the old community identity has been filled by a new, forward-looking, and optimistic attitude. While the focus of community identity may have shifted, this has not spelled a decline in civic pride."},{"t":"p","text":"But what of this new identity? Is it genuine, or is it merely the transitory longings of the refugees from modern times? Can it last in the face of new demands for continued change and the influx of both new residents and tourists to the community? Is there the danger that if we push tourism too hard we might jeopardize what &ldquo;small town feeling&rdquo; still exists in Portsmouth? Is it not possible that &ldquo;new blood, new ideas, and a kick in the pants,&rdquo; unguided by a prior consideration of community goals, could lead us down the primrose path of unintended consequences?"},{"t":"p","text":"Consideration of the type of tourism which should be fostered in Portsmouth attempted to address this concern for the proper balance between the encouragement of tourism and the maintenance of a small town feeling. In this context, the major issue was whether the day tripper should be encouraged over the overnight tourist. Mr. Cordeau cited the economic advantages of overnight tourism, and Mr. Cabrera argued that the day tripper brings all the headaches associated with the tourist, but nowhere near the money of the overnight guest. Both advocated the construction of a downtown hotel to foster overnight tourism. However, a number of members of the audience, granting the need for some overnight accommodation, feared that in encouraging this type of tourist, Portsmouth might become like every other tourist town. Holiday Inns, Howard Johnsons, and McDonalds would, they thought, cause the city to &ldquo;lose its charm.&rdquo;"},{"t":"p","text":"Although the desirable extent or type of tourism was never finally resolved, it is important that a significant portion of the audience expressed some concern about the dangers of too much tourism. Thus, while it is impossible to say with certainty whether the benefits of tourism compensate for possible losses in community identity, it is noteworthy that a cross section of the community fears simple encouragement of tourism, unguided by some consideration of its proper kind and extent. In the absence of such prior consideration, tourism might, over time, make Portsmouth into a completely different place."},{"t":"p","text":"Perhaps even more important, in light of the apparent split in the community between the old-timers and the newcomers, is the fact that these views were held by &ldquo;native&rdquo; and &ldquo;carpetbagger&rdquo; alike. While these two groups differ in their understandings of what the community should be like, they seem to have a common interest in preserving the community rather than making Portsmouth just another stop on hordes of tourists&rsquo; itineraries."},{"t":"p","text":"<em>George K. Lagassa</em>"}]},{"id":"m2","kicker":"Second Public Meeting &middot; March 30, 1977","title":"Economic Development and a Viable Community","kind":"meeting","num":"II","panelists":["Gary Getchell","John Grammas","Melvin Low","Russell van Billiard"],"place":"Portsmouth Public Library &middot; March 30, 1977","blocks":[{"t":"p","text":"The question of &ldquo;balance&rdquo; dominated this evening&rsquo;s session, which saw discussions among Panelists Gary Getchell (proprietor of Paterson &amp; Getchell Paint &amp; Decorating Store in downtown Portsmouth), John Grammas (owner of the Two Brewers Steak House on Woodbury Avenue, Portsmouth, outside the city center), Melvin Low (Portsmouth Trust Company Vice-President and Mortgage Officer), Russell van Billiard (Portsmouth Economic Commission), and members of the audience."},{"t":"p","text":"Disagreements about &ldquo;balance&rdquo; involved mainly the question whether an emphasis on historic preservation or restoration in Portsmouth, and on specialized shopping downtown, was overwhelming more &ldquo;everyday&rdquo; type of business usage and shopping opportunities. It became clear that a variety of opinions on the importance and merits of historic preservation and beautification exists, and that these various opinions are indeed related to different notions of what makes a community &ldquo;viable.&rdquo; It also became evident in this session that some criticism of the city planning function exists in Portsmouth, ranging from a simple assertion that planning officials have been creating &ldquo;welfare for the rich&rdquo; to more subtle criticisms that planners have &ldquo;not kept their eye on the ball,&rdquo; and have thereby given the wrong emphasis to their efforts. They have not, some think, given sufficient attention to preserving the economic patterns of everyday life for the average citizen."},{"t":"p","text":"This session also showed the complexity of relationships among economic health, tasteful community development, and nationwide economic trends, i.e., the search for profit by national firms which develop regional shopping centers away from city centers. It showed that historic preservation, as a reaction against urban and suburban sprawl, might be no real answer to fundamental problems posed by economic pressures in America. In the words of Panelist Low, in the context of the mode of operation of national firms, &ldquo;downtown Portsmouth is just another shopping center trying to survive.&rdquo; Does a community have the tools&mdash;and is it using them&mdash;to combine effectively tasteful historic restoration with the economic vitality of a downtown shopping center? Is it able to follow other worthy and more subtle values than economic profit? If so, can these values benefit <em>all</em> members of the community?"},{"t":"p","text":"Many of the comments on such key questions were formulated in the context of different visions or images of a healthy &ldquo;downtown Portsmouth.&rdquo; Is &ldquo;downtown&rdquo; primarily a place for everyday errands and purchases? Should it be an area which appeals through aesthetic charm and specialty shops? Might it be seen as a meeting place in the style of urban centers in some European countries? And&mdash;to conclude this series of questions which have no infallible answers&mdash;can some mixture of these functions be attained?"},{"t":"p","text":"Greek-born Panelist John Grammas was one of several who spoke on relationships between economic health and a vibrant community. His question of whether American communities provide real opportunities for &ldquo;expression of the human spirit&rdquo; was of particular interest. He spoke of the absence of &ldquo;places for people to go&rdquo; to meet one another, and of minimal human contacts, especially for the young and the senior citizen. Although owner of a restaurant on the fringes of the city&mdash;in an area now undergoing a type of strip-shopping center development&mdash;he spoke of his concern that downtown Portsmouth be economically strong, to help provide this meeting place."},{"t":"p","text":"Indeed, there was much less discussion during the evening of industrial development&mdash;as explained in Raymond Richardson&rsquo;s article in the Crossroads series (p. 31)&mdash;than of the status of downtown business. Perhaps this was because Portsmouth has indeed created a substantial industrial base, at least since the threatened closing (1964) of the Naval Shipyard in neighboring Kittery, Maine, and especially in the last few years. Russell van Billiard reviewed these events. Much more discussion, however, centered on the meaning of the &ldquo;Market Square Project,&rdquo; which had just recently won final approval of the City Council."},{"t":"p","text":"This project involves transformation of the downtown Market Square area by the planting of trees, narrowing of roadways, and beautification of street surfaces and lighting fixtures. Advocates tend to associate the aesthetic appeal of such changes with the creation of a &ldquo;market-type&rdquo; center for human interchange, and thus&mdash;presumably&mdash;with a more prosperous downtown. Their approach to the downtown problem might be termed the &ldquo;aesthetic experience&rdquo; outlook. For example, in the discussions of this evening, spokesmen of this approach used expressions such as &ldquo;I would not choose to live in an area which had not preserved its historic heritage.&rdquo; They tended to comment on issues in terms of what kind of &ldquo;feeling&rdquo; they have in a community."},{"t":"p","text":"A third view on downtown Portsmouth is said by its advocates to be more practical and realistic: downtown should be a place, in the words of Panelist Gary Getchell, where one can &ldquo;buy a set of underwear and a flashlight.&rdquo; He and other critics of the Market Square Project argued that it is questionable whether economic well-being will be promoted in downtown Portsmouth by such schemes. They also said that by focusing upon such projects, more fundamental factors underlying prosperity in a city&rsquo;s business district are overlooked."},{"t":"p","text":"While asserting his support for Strawbery Banke, but opposition to the unrestricted spread of Strawbery Banke &ldquo;type of thinking&rdquo; into all facets of the city&rsquo;s life, Getchell spoke of &ldquo;a fever in town&rdquo; directed towards historic preservation and beautification. More moderate than some other opponents of this trend (one audience participant broached the term &ldquo;elitist&rdquo; in referring to those interested in the historic movement), Getchell stressed the importance to a community of the concrete everyday life of citizens. Indeed, he argued that a community is in fact formed through the daily contacts of the &ldquo;average citizen&rdquo; as he makes his rounds of errands in the downtown district. The creation of a downtown center &ldquo;tailor-made for specialized businesses&rdquo; rather than for these everyday needs would, he said, lead to the very opposite of a vibrant community."},{"t":"p","text":"While Mr. Getchell stated that &ldquo;no one force is doing any one thing wrong,&rdquo; but that the effect of the historic &ldquo;fever&rdquo; was cumulative, he and others frequently focused on the role of the &ldquo;city planning department.&rdquo; This theme was emphasized even more in other sessions of the Crossroads Project. Most of all, he and others objected to what they claimed to be the notion that &ldquo;there was nothing in downtown Portsmouth&rdquo; before the efforts at historic preservation and beautification started. Getchell, former Councilwoman Evelyn Marconi in the audience, member of the Board of Zoning Adjustment Mildred McLaughlin, and others either stated that &ldquo;Portsmouth was always an industrial community&rdquo; (Mrs. Marconi) or that the ability of the downtown district to supply the needs of the average citizen had declined in recent years&mdash;thereby undermining what had indeed been a lively center of trade and interchange. In a certain sense, Mr. Getchell argued, the planners had not done enough planning&mdash;they had not planned how to conserve this &ldquo;old commercialism.&rdquo;"},{"t":"p","text":"One difficulty in such views is that&mdash;at least in the Crossroads Project&mdash;there is only sketchy evidence of a real effort to analyze the economic forces influencing commercial viability in the downtown area. In this evening&rsquo;s session, Evelyn Marconi argued that there had &ldquo;never been&rdquo; a real &ldquo;market survey&rdquo; of buying habits and preferences of people in the region undertaken by the City of Portsmouth. While she implied that planners therefore acted without sufficient knowledge, it is probable that national firms have surveyed the area before deciding on projects such as the Newington Mall. Indeed, banker Low indicated the dependence of local communities on such efforts. National firms, he pointed out, simply come into a region and &ldquo;scan it&rdquo; to determine where to place the ubiquitous, automobile-oriented and impersonal shopping malls. They are not locally-oriented."},{"t":"p","text":"Several participants commented upon an apparent decline in the economic health of downtown Portsmouth, as evidenced by the closing of stores and the precariousness of the &ldquo;downtown mall,&rdquo; Portsmouth Parade (re-named Center Stage Alpha in an effort at making it economically viable). On the other hand, it was pointed out that new shops continue to open. While most in attendance seemed agreed that the Newington Mall has had an adverse effect on downtown shopping, there was no clear agreement when one of the project directors posed the question of how one&rsquo;s views on downtown affected one&rsquo;s views on the creation of another projected shopping center (on the former &ldquo;Frink Farm&rdquo;) on the outskirts of town. Would not such proliferation of shopping centers further harm downtown? Would this not in turn increase the tendency to &ldquo;save&rdquo; downtown, not through competition by general businesses, but through aesthetic reconstruction and specialty shops which probably appeal only to a segment of the population and to tourists?"},{"t":"p","text":"One in the audience phrased the problem of downtown Portsmouth in this way: &ldquo;I have to decide where I&rsquo;m going to shop&mdash;Newington Mall or downtown Portsmouth. That is the real choice.&rdquo; He argued, along &ldquo;Getchellian&rdquo; lines, that more general merchandise, in greater variety, should be offered the downtown shopper. But how? Would this be economically viable for the store owner?"},{"t":"p","text":"A number of critics of the historic-beautification movement argued that Portsmouth is becoming too oriented to tourist business, failing to address year-round needs of its citizens for shopping. It is undoubtedly true that such concerns contributed to the city&rsquo;s rezoning of the &ldquo;Frink Farm&rdquo; property for a shopping center. Perhaps even more important, however, was competition for tax revenues with the neighboring industrial-commercial community of Newington. The existence of neighboring major shopping centers (in this case, near a town border) reflects a pattern which can be seen in every part of the United States. Such shopping malls, &ldquo;anchored&rdquo; by national chains, draw consumers from whole regions, not just from the &ldquo;core city.&rdquo; They are utilitarian and standardized, hardly objects for aesthetic contemplation or personal contacts, which remain the tasks of downtown Portsmouth. But it is highly uncertain whether downtown can perform the function of a shopping and mingling place for all citizens. It is more likely that the trend will continue towards two styles of shopping and interaction: that of the malls for city and regional customers who need to buy &ldquo;a set of underwear and a flashlight,&rdquo; that of downtown for those who enjoy the specialty restaurants and shops."},{"t":"p","text":"Those who emphasize the importance of projects such as Market Square beautification&mdash;the &ldquo;newcomers,&rdquo; they may sometimes be called&mdash;do see their efforts as ultimately beneficial to <em>all</em> the community. They do not claim to speak solely for the interests of the more affluent sectors of Portsmouth&rsquo;s populace. Yet set in the context of the way political communities have operated in many parts of this and other industrialized countries, it would be impossible to ignore the correlation of interest in such issues with certain socio-economic data such as income level and years of formal education."},{"t":"p","text":"It is no secret that there are numerous American upper-income communities which preserve natural scenery and historic landmarks within a general setting of affluence. On the other side, it is equally evident that there are other communities in which the &ldquo;development influence&rdquo; is dominant. More or less random housing and commercial developments change such communities in a more or less random and often unattractive manner, depending upon the pressure of developers for profit, their tie-ins with local officials, and upon the presumed tax advantages of development to the community."},{"t":"p","text":"As Russell van Billiard and Evelyn Marconi pointed out in this evening&rsquo;s session, Portsmouth exists in a region. That region has various kinds of towns, various kinds of development patterns, and various kinds of &ldquo;influential people&rdquo; within the various town boundaries. Most of what happens in the region is influenced by individual towns, not by regional bodies, and not by Portsmouth. Whether the region needs two adjoining major shopping centers may well be questioned, but their development results willy-nilly from pressures in individual communities, in the absence of a regional overview."},{"t":"p","text":"Yet the regional setting has considerable significance for Portsmouth. The city faces the test of whether it can effectively blend the interests and outlooks of a variety of persons with different backgrounds, not only within its boundaries, but from a wider area. It has the tremendous advantage of not being simply a blob of territory in an anonymous sea of sprawl: it has a recognizable downtown with definite characteristics. As much as the malls draw regional shoppers, downtown draws regional tourists. While few tourists will likely visit shopping centers for reasons of historic or aesthetic experience, some shoppers must continue to use downtown if it is not to become simply a museum."},{"t":"p","text":"A geographic division of Portsmouth into shopping center and museum would have the added disadvantage of being untrue to the diversity of the city&rsquo;s population, for it would tend to reinforce fears that downtown will become the special preserve of the affluent. In short, &ldquo;balance&rdquo; probably requires something more than just adding up the sum totals of commercial development on the one hand and aesthetic atmosphere and specialized enterprises on the other. It requires a mingling of different kinds of undertakings and different kinds of people. The objective is clearer than the methods of obtaining it."},{"t":"p","text":"<em>George K. Romoser</em>"}]},{"id":"m3","kicker":"Third Public Meeting &middot; April 13, 1977","title":"History, Aesthetics, and Community Identity","kind":"meeting","num":"III","panelists":["Nicholas Aeschliman","Margaret Armitage","Evelyn Marconi","Paul McEachern"],"place":"Portsmouth Public Library &middot; April 13, 1977","blocks":[{"t":"figure","caption":"Flag-draped storefronts and civic parade, downtown Portsmouth, c. 1900","credit":"Strawbery Banke, Inc., Portsmouth, NH","src":"images/img06.jpg"},{"t":"p","text":"The purpose of the third workshop, one of the most controversial and by far the best attended, was to focus directly on the value of historic preservation as a community enterprise. The panelists participating in the discussion of this key issue were attorney Nicholas Aeschliman (City Councilman), Margaret Armitage (Strawbery Banke Director), Evelyn Marconi (former City Councilman, proprietor of Geno&rsquo;s Coffee Shop), and attorney Paul McEachern (member of the Prescott Park and Theatre by the Sea Boards of Trustees)."},{"t":"p","text":"Especially with the advent of the Strawbery Banke restoration, Portsmouth has been involved in a continuing revitalization of the city&rsquo;s historic buildings for over a decade. This effort has involved financing from city government, the federal government, private foundations, voluntary associations, and private bank accounts, as well as the labor of a great number of individuals."},{"t":"p","text":"At least on the surface, this effort seems valuable and worthwhile and appears to have the support of most people in the community. It was precisely for this reason that it seemed appropriate to subject historical preservation to critical examination. Perhaps, whenever any enterprise is undertaken with great zeal, as has been historical preservation in Portsmouth, the dangers of overzealousness loom in the background. Moreover, where community enterprises are undertaken with such hope and optimism, they tend to develop an aura of inevitability, and those involved fail to see that they are making distinct choices for the community&mdash;choices which may have both beneficial as well as unanticipated negative consequences. Thus the major objectives of this workshop were to identify the dangers of historic preservation and to clarify the community choices implicit in the movement."},{"t":"p","text":"Participants first attempted to identify the value of historic preservation. Mrs. Armitage noted that Strawbery Banke brings great economic benefits to Portsmouth. In 1976 alone, the Strawbery Banke preservation attracted 60,000 people to Portsmouth and spent almost its entire $336,000 budget in the city. In addition to these economic advantages, Mrs. Armitage emphasized the value of serving the museum&rsquo;s professional function&mdash;the interpretation of the past for the public. Not only does this interpretive function serve to educate the public, but it also clarifies, especially for Portsmouth residents, the city&rsquo;s historical continuity, thus strengthening their community identity."},{"t":"p","text":"Panelist McEachern, in comparing the current emphasis on historic preservation to the energy crisis, took an economist&rsquo;s position on the value of the former:"},{"t":"p","text":"Thus, for Mr. McEachern, the value of historic preservation is primarily a matter of supply and demand. Inherently, history has no value of itself, independent of the market for history."},{"t":"p","text":"A member of the audience took an apparently opposing position: he thought that, because of the conditions under which they were built, old buildings display more aesthetic appeal and craftsmanship than do more contemporary structures:"},{"t":"p","text":"With this understanding of the value of historic preservation, the visible presence of history in our daily lives has intrinsic worth beyond the instrumental economic advantages we have identified. Belief in this intrinsic worth does not really help us in determining how to treat particular buildings or structures, but it does allow us to choose between restoring an old structure or replacing it with a new one. That is to say, the Kearsarge and Rockingham Hotels seem somehow better than a new Holiday Inn."},{"t":"p","text":"Of course, it need not be the case that a Holiday Inn will be aesthetically inferior to the Rockingham simply because it is newer. True beauty is beauty, whether it is old or new. However, it seems predictable that a new Holiday Inn is likely to be aesthetically inferior to the Rockingham."},{"t":"p","text":"Modern society, increasingly democratized and egalitarian, fosters the value of efficiency over beauty (which is invariably expensive). Out of this preference for efficiency come standardized architectural forms, a profusion of governmental regulations, corporate instead of private ownership, corner-cutting construction budgets, and the use of union labor instead of craftsmen&rsquo;s workmanship. Over time some people naturally tire of these structures and, with considerable nostalgia, begin to regret the demise of the old buildings. As these old buildings comprise a smaller and smaller portion of useful structures, their scarcity (in Mr. McEachern&rsquo;s terms) becomes apparent, and their perceived value increases. However, what is really scarce is not so much the buildings themselves as the quality: the values, and the pride of workmanship for which they stand. Since democratic society does not provide incentives for the pursuit of these values, historic preservationists, who are not pre-eminently democrats, assign themselves the responsibility of protecting these values of the past."},{"t":"p","text":"Just as new buildings can be constructed with greater or lesser quality, so too can historic structures be well or poorly preserved. Indeed, while discussion at the workshop revealed little dissension about the value of historic preservation, there were major disagreements about how such work should be accomplished. Panelist Marconi was the first to voice this concern:"},{"t":"p","text":"Here Mrs. Marconi not only raised the general issue of the proper means by which historic preservation should be accomplished, but she also hinted at her disagreement with one particular method&mdash;the Historic District Ordinance."},{"t":"p","text":"In its final form, Portsmouth&rsquo;s Historic District Ordinance requires that major alteration or demolition of any building built prior to 1890 and located within specified boundaries in the downtown area, be subject to approval of a commission of Portsmouth residents. Specifically, this involves the filing of an application with the Historic District Commission, justification of the proposed action before the Commission, and final approval or disapproval by a vote of the Commission."},{"t":"p","text":"Underlying the Historical District Ordinance is the notion that the community should have some say about its appearance, especially in regard to its historic buildings. As Panelist Aeschliman put it:"},{"t":"p","text":"Thus, according to Mr. Aeschliman, there is something about the preservation of old buildings which justifies community intervention into what has usually been a private matter in our society."},{"t":"p","text":"According to Mrs. Marconi, nothing should be allowed to interfere with our most fundamental right&mdash;the right to ownership of private property. A willing buyer and a willing seller arrive at an agreement. No part of this transaction should be &ldquo;relinquished to a committee.&rdquo; As long as we accept this right as fundamental, then we must expect historic preservationists to adapt rather than change the right."},{"t":"p","text":"In making this argument, Mrs. Marconi seemed clearly in the minority, but many in the audience were employees of Strawbery Banke or owners of old homes in the South End, who stand to benefit from an Historic District Ordinance. One member of the audience, who was obviously more persuaded by Mr. Aeschliman&rsquo;s argument than by Mrs. Marconi&rsquo;s, attempted to raise the discussion to a slightly higher level of abstraction in the hope of resolving the differences between the two. He said:"},{"t":"p","text":"While this statement was quite persuasive at the time and did serve to move the discussion on to another topic, it should be noted that it was somewhat one-sided and failed to grapple with the question implicit in Mrs. Marconi&rsquo;s concerns: how do we balance individual rights against the demands of the community?"},{"t":"p","text":"While some might view historic preservation as a community need, others are not so persuaded. For these people, the sacrifices required by preservation are not justified by the perceived benefits. For them, historic preservation is a community demand, not a need, a perception that has its foundation in the origins of Strawbery Banke. Thus, when asked how, with hindsight, she would have preferred Strawbery Banke&rsquo;s accomplishment, Mrs. Marconi responded:"},{"t":"p","text":"In the above statement, the reference to an unnamed &ldquo;they&rdquo; is especially significant. Implicitly, Strawbery Banke and historic preservation in general are viewed as a demand imposed on one element of the community by another element."},{"t":"p","text":"For the advocates of historic preservation, the advantages of their efforts seem obvious, and they &ldquo;...get very unhappy when (they) hear efforts that are being made to involve greater numbers of people in some form of institutionalized historic preservation being downgraded.&rdquo; For those in the community who view historic preservation as a dictatorial demand, the current emphasis on preserving old buildings and recreating the past is a symptom of a disease, one major consequence of which is the unjustified sacrifice of basic individual rights. As Panelist Marconi somewhat rhetorically expressed it:"},{"t":"p","text":"The above discussion portrays, with some accuracy, a meeting at which two opposing camps were armed to combat one another with the major intention, not of resolving differences, but of winning an argument. The workshop clearly suffered from this combative atmosphere. Many statements, by both panelists and audience alike, were rhetorical in nature, frequently skirted important questions, and generally clouded rather than clarified the issues."},{"t":"p","text":"It may be argued that Mrs. Marconi&rsquo;s concerns are fundamentally moot. That is, Strawbery Banke does exist and seems likely to continue for some time; and the Historic District Ordinance is a not easily altered reality. Complaints about Strawbery Banke&rsquo;s origins and ideological concern about individual liberty and free enterprise emerged primarily as naysaying. Thus, one member of the audience criticized Mrs. Marconi&rsquo;s failure to look at the beneficial results of Strawbery Banke:"},{"t":"p","text":"There is little to be argued with here. Strawbery Banke and historic preservation in general have produced immense tangible and intangible benefits for Portsmouth. Nevertheless, Mrs. Marconi&rsquo;s position does serve to remind us that historic preservation is not one hundred percent benefit. In addition to the potential loss of freedom which she identified, there are other dangers: the reconstruction of the past in such a way as to produce a plastic environment lacking in genuine community; public sanctions in support of particular architectural and decorating tastes in the name of a vague and inaccurate concept of historic preservation; and community assumption of the burden of maintaining physical testaments to families no longer able to maintain these testaments themselves."},{"t":"p","text":"It may be that historic preservation&mdash;like fake Victorian houses and asbestos siding&mdash;is just another fad, characterized by a pseudo-concern for historic purity and manifesting itself in narrow clapboards, nine over six windows, and exposed beams. But this fad is different. Unlike previous fashions, this one is sanctioned by force of law and may not be easy to change as tastes change. Fifty years from now, our descendants may take a weekend ride in their solar powered automobile. Driving down Gates Street, the woman may comment to her spouse: &ldquo;Someone must have really made a killing on those nine over six windows. They certainly are hideous, and I bet they&rsquo;re a pain to keep clean.&rdquo; We hope our descendants will still be at liberty to change things in keeping with their own &ldquo;good taste.&rdquo;"},{"t":"p","text":"<em>George K. Lagassa</em>"}]},{"id":"m4","kicker":"Fourth Public Meeting &middot; April 27, 1977","title":"Paying for Public Services: The Dollars and Cents of Community Growth","kind":"meeting","num":"IV","panelists":["Peter Loughlin","Jeffrey A. Marple","A. Robert Thoreson","Joyce Hanrahan"],"place":"Portsmouth Public Library &middot; April 27, 1977","blocks":[{"t":"figure","caption":"Formal assembly at Portsmouth City Hall, c. 1890s","credit":"Strawbery Banke, Inc., Portsmouth, NH","src":"images/img07.jpg"},{"t":"p","text":"One of the important changes occurring in Portsmouth is in the composition of its population. More and more new faces are seen on the streets along with those of many old-time residents. This is especially evident in the older parts of town, close to Market Square: the South End, Bow Street, McDonough Street."},{"t":"p","text":"As we have seen, there is a group of the &ldquo;old-timers&rdquo; who view the arrival of such newcomers as a mixed blessing. From their own perspective, though, new residents may serve to enliven old neighborhoods with their youthful vitality and willingness to work on improving their property; their arrival may also lead to the displacement of others who, given the scarcity of housing in a time of increased demand, are forced by the market to seek lower cost housing elsewhere."},{"t":"p","text":"Another potential problem arises from the fact that many newcomers come to Portsmouth from places where taxes are higher and services are better. Thus, they inject a new element into the city&rsquo;s tax picture, as they demand increased or improved services and are more willing to support higher taxes than were the citizens whom they displaced."},{"t":"p","text":"These two hypotheses (that newcomers displace old timers and that newcomers demand more services, which create higher taxes) formed the basis for workshop #4, in which panelists Peter Loughlin (former City Attorney), Jeffrey A. Marple (local real estate broker), A. Robert Thoreson (Portsmouth Planning Director), and Joyce Hanrahan (City Councilman and former School Board member) discussed related issues associated with housing, taxation, and community services or needs."},{"t":"p","text":"Predictably, the discussion revealed that reality was far more complex than the initial hypotheses suggested. Thus, for example, City Planner A. Robert Thoreson said that higher taxes cannot be solely attributed to the increased and different demands of newcomers. According to Mr. Thoreson, &ldquo;Need is a perception of multiple actors and, to a lesser extent, it is the articulation of various kinds of standards.&rdquo; In explaining this statement, Mr. Thoreson showed that while a new group of &ldquo;young professionals&rdquo; have exercised considerable influence over patterns of community expenditures and thus over related standards of need, other groups have not been neglected. Admittedly, city expenditures in the last five years are clearly dominated by items quite high on the list of the newcomer group. A significant portion of Federal Community Development funding has been devoted to neighborhood revitalization and Market Square improvements, both of which have been supported by newcomers and opposed by many old timers. In addition, a substantial portion of the general fund has been devoted to such items as the purchase of land (for use as open space) and recycling old buildings (i.e., the library)."},{"t":"p","text":"However, despite the substantial influence of the &ldquo;young professionals&rdquo; and newcomer group manifest in these expenditures, the city has not lost sight of the needs of other citizens. Certainly, the construction of the fishing pier on Pierce Island shows the influence of a group other than the &ldquo;young professionals&rdquo; or newcomers."},{"t":"p","text":"Moreover, figures revealed during the discussion indicated that the interests of the aged and the low income groups have not been neglected. Mr. Loughlin pointed out that in 1954 there was no publicly subsidized housing in Portsmouth. Today there are over 1,000 such units, which means approximately 15% of all housing in Portsmouth is publicly subsidized. Together with the allocation of community development funds to an industrial park and current discussions of a multi-purpose center for use by the entire community, this would suggest that the definition of community need has not become the exclusive domain of the &ldquo;young professionals.&rdquo; Clearly, any attempt to explain patterns of public expenditures in such terms is grossly oversimplified."},{"t":"p","text":"Adding to the complexity of any such explanation are the &ldquo;various kinds of standards&rdquo; which, according to Mr. Thoreson, also shape community &ldquo;need.&rdquo; These standards include the following:"},{"t":"p","text":"Mr. Thoreson&rsquo;s analysis suggests that a substantial portion of Portsmouth&rsquo;s expenditures is not a matter of choice. Increases in these uncontrollable costs cannot be attributed to any one group, which suggests that increased costs and related tax hikes result from a far more complicated array of factors than we originally expected. While Mr. Thoreson did predict that local taxes will continue to increase, it is quite apparent that this cannot be attributed to the demands of any single group."},{"t":"p","text":"The workshop did, however, reveal a definite relationship between higher taxes and uncontrolled community growth. It became apparent during the discussion that the simple notion of &ldquo;bigger is better&rdquo; is not realistic. The idea that more people will lessen the burden of local tax rates because the tax burden will be distributed among more people is simply false. Some types of new residents may indeed have this effect. Older couples with children beyond school age who build new homes in Portsmouth pay their share of taxes or more. However, this is unlikely to be the case with apartment dwellers."},{"t":"callout","label":"&#x25A6; Housing Policy &mdash; The Fiscal Case for the Moratorium","paras":["If each of these apartments houses only one school age child, the consequence may be overburdening the schools and lowering the quality of education, unless taxes are raised to accommodate the new demand on educational facilities."]},{"t":"callout","label":"","paras":[]},{"t":"p","text":"In order to avoid this problem, city government attempted to manage growth and to control multi-family housing. To this end, the most important step was the moratorium on the construction of new apartment buildings in the city. This not only alleviated the problems of apartment dwellers not paying their share of the tax burden, but it also motivated the renovation and remodeling of old buildings to house more and better apartment units. For some this has been seen as a real improvement in the cityscape. For others it has meant new pressure on real estate prices and rents, reassessment and higher taxes, and for some, displacement to other neighborhoods or communities."},{"t":"p","text":"Although no hard facts were provided in this regard during the workshop, it is certain that some of those residents displaced by change have found homes in the above mentioned subsidized housing. However, according to Panelist Marple, &ldquo;The single largest demand of realtors is for apartments.&rdquo; Those responsible for this demand include employees at the Navy Yard, the Coast Guard station, Pease Air Force Base, new companies in the area, and the Seabrook Power Station construction site, as well as UNH students. Clearly the demand for apartment dwellings greatly exceeds the supply, which suggests that these people are probably forced to find housing outside of Portsmouth. Thus, Panelist Loughlin noted that despite the rapid increase in publicly subsidized housing in Portsmouth since 1954, it may be that &ldquo;Local people are no better off in terms of available housing than they were in 1954.&rdquo;"},{"t":"p","text":"The housing problem is a part of our initial hypothesis that newcomers displace old time residents. However, it is far more complicated than the hypothesis would suggest. Housing in Portsmouth cannot be looked at in a vacuum. Changes in housing costs and market values are largely the result of factors quite outside Portsmouth&rsquo;s control. That this fact is not easily accepted is apparent in the indignant plaint of one member of the audience: &ldquo;How do you think people like us are going to be able to afford to buy a house here?&rdquo; The answer is, of course, that some people who could at one time afford to own a home in Portsmouth no longer are able to do so. But the reasons for this are far more complicated than might be expected and are well out of the reach of city public policy. As another audience member phrased it, &ldquo;The American dream of home ownership is out of sight for a good percentage of the people.&rdquo; This is a national problem, not to be solved by Portsmouth alone."},{"t":"quote","text":"&ldquo;The American dream of home ownership is out of sight for a good percentage of the people.&rdquo; This is a national problem, not to be solved by Portsmouth alone.","attr":""},{"t":"p","text":"Panelist Marple underlined this important point by showing that the costs of many building materials have skyrocketed, thus jacking the costs of housing beyond the financial capability of many families. Beyond this, he suggested that we live now in a world in which people are more mobile than ever before. With improved transportation and communication, fewer and fewer people choose to spend their lives in a single area. As a result the cost of a house increases each time it is sold. In this context Mr. Marple cited the example of &ldquo;a couple who has lived in Portsmouth for a long period of time and decides they would like to retire to Florida. They get as much as they can for their house. So who is causing the inflation? The guy who is moving in or the guy who is moving out?&rdquo;"},{"t":"p","text":"This, of course, fails to account for the considerable inflationary impact of real estate speculation. That is, in many cases the new owner, &ldquo;the guy who is moving in,&rdquo; expects to make a healthy profit by reselling his property relatively soon. While such speculation may have the advantage of promoting property improvements, it cannot be denied that it has the additional impact of forcing some long-time residents into less desirable housing. Again, however, such speculation, with both its beneficial and harmful consequences, is a fact of life in a free enterprise system. Although the city may be able to set a climate which encourages or discourages newcomers to the community, it is not in a position to regulate real estate turnover or property prices."},{"t":"p","text":"Taking all of these observations together, we begin to see a picture of a changing community faced with serious, but not unique, growing pains. Taxes continue to rise; long-term residents continue to leave the community&mdash;either voluntarily or because of increased pressures on their financial capabilities&mdash;and these significant changes seem largely outside the control of city government. In such a situation, it is not surprising that many people, especially if they disapprove of the changes, feel powerless and alienated and are bitter about past changes as well as proposals for current and future change. This analysis was borne out by Panelist Hanrahan in her defense of expenditures for Market Square improvement against extensive criticism from some audience members:"},{"t":"p","text":"Mrs. Hanrahan&rsquo;s statement implies the possibility that opposition to certain changes, even when they offer great potential benefit, is opposition to change <em>per se</em>, whatever its benefits. Such a reaction by the citizen, beleaguered by seemingly endless and rapid-paced change, is neither surprising nor atypical. Unfortunately, it may be misdirected, for a successful Market Square renovation may prove beneficial for all citizens. If Market Square improvements do improve business, then we may expect new businesses to occupy empty stores. Since empty buildings are, according to Panelist Loughlin, entitled to an abatement in assessed value, their occupation can contribute to easing the tax burden all around."},{"t":"p","text":"Yet, even assuming the overwhelming success of Market Square improvements, we may predict there will still be demands for expenditures in excess of available city revenues. The major unsatisfied &ldquo;needs&rdquo; which emerged from the discussion include a multi-purpose center, an indoor swimming pool, a new multi-level parking facility, aid to the poor, and improvements in education. As long as we live in a political system which seems to satisfy the &ldquo;needs&rdquo; of &ldquo;multiple actors&rdquo; (to use Mr. Thoreson&rsquo;s language), there will be endless and apparently insatiable demands."},{"t":"p","text":"<em>George K. Lagassa</em>"}]},{"id":"m5","kicker":"Fifth Public Meeting &middot; May 11, 1977","title":"The Changing Cultural Environment","kind":"meeting","num":"V","panelists":["Lee Cooper","William Elwell","Jon Kimbell","Rob Neumer"],"place":"Portsmouth Public Library &middot; May 11, 1977","blocks":[{"t":"p","text":"What are the benefits and costs of the arts in a community? What are and should be the citizen&rsquo;s concerns with regard to the arts? What are the concerns of artists themselves? What function do the arts&mdash;what is often called &ldquo;culture&rdquo;&mdash;have in a sound community?"},{"t":"p","text":"These were some of the questions on the agenda for discussion as the Crossroads Project sponsored its fifth public session. The panelists were Lee Cooper (director of a Title I educational project for the Portsmouth schools), William Elwell (director of art and music at Portsmouth High School), Jon Kimbell (Producing Director of Portsmouth&rsquo;s Theatre by the Sea and of the Prescott Park Arts Festival), and Rob Neumer (a leather craftsman creating his work in a shop at Strawbery Banke)."},{"t":"p","text":"The relationship of the arts to other aspects of community life has been an important theme of European&ndash;North American history for many years. Frequently, the artist has appeared to be in a state of tension with the community. The French philosopher Jean Jacques Rousseau argued almost two hundred years ago that the theatre, for example, was a sort of frivolity in a well-organized community; citizens of such a community should tend to their family life and daily toil rather than extravagantly spend funds and precious time for the entertainments of public theatre!"},{"t":"p","text":"At the same time, of course, Rousseau himself had a great influence on the &ldquo;artist-bohemians&rdquo; of the nineteenth and twentieth centuries. The reason for this mixture of views was that Rousseau could find (or even think of) very few communities generally devoted simply to cultivation of the family and hard work. Most were increasingly dominated by the search for money and by a more-or-less crass commercialism. In such an environment, the claims of the artist would have to be upheld (for they were not &ldquo;sound&rdquo; communities), and the artist would inevitably be something of an outsider, something of a &ldquo;bohemian.&rdquo;"},{"t":"p","text":"And what might be the role of the arts in a modern American community? Rousseau&rsquo;s point, that in a working, family-oriented community the arts might well recede in importance, was long echoed in the American heritage. The Puritan element in American culture has hardly been favorable to artistic expression, especially not that disassociated from religious purposes. This element of American culture has been satirized many times&mdash;in Henry L. Mencken&rsquo;s writings, by Sinclair Lewis in his famous novel <em>Main Street</em>, by numerous critics of American manners and mores. Especially when Puritan distrust of &ldquo;unconventional&rdquo; behavior has been combined with the commercial mind and &ldquo;boosterism,&rdquo; it has been regarded by many intellectuals as harmful to the development of cultural awareness in American communities."},{"t":"p","text":"It seems evident that several influences in America since the second World War have substantially altered the conditions under which artists and communities relate to one another, and thus have also altered the old pattern of artist-community tension. Quite different issues may be characteristic of our own time."},{"t":"p","text":"Today&rsquo;s media influence is enormous, and the most important part of that influence is in the &ldquo;entertainment&rdquo; provided by television. While television does use the talents of artists and craftsmen, these talents tend to be placed in the service of a homogenizing entertainment industry pitched at a fairly unsophisticated level. TV&rsquo;s major programs are aimed at broad national audiences, whether in New Hampshire or Arizona, Oregon or Florida. They have saturated the whole process by which young people in postwar America have grown up and assimilated their views of reality. Certainly the postwar media impact has lessened the importance of older traditional methods by which people obtain their values and sense of various &ldquo;lifestyles.&rdquo; We may today have to ask not so much about the Puritan influence in America as about the significance of the images of reality conveyed by standardized TV versions of &ldquo;the American way of life.&rdquo;"},{"t":"p","text":"Other powerful forces have also been at work in postwar America, at first leveling regional, occupational, and group differences, and more recently leading to an apparent reaction to this standardization. The quest for affluence has been dominant throughout the period since 1945, as has the factual increase in middle-class and upper-middle-class income groups with disposable income for travel, education, recreation, sport, and other discretionary pursuits (including, most recently, perhaps &ldquo;cultural activities.&rdquo;) Massive increases in governmental scope, symbolized most clearly by the interstate highway system (with its effects on residential and occupational patterns), have been in the service of a standardization of American &ldquo;lifestyles.&rdquo; The ubiquitous plasticity of Kentucky Fried Chicken, McDonald&rsquo;s hamburger stands, and climatized malls have been outward manifestations of suburban sprawl and the growth of mobility."},{"t":"p","text":"In postwar America, the &ldquo;Puritan work ethic&rdquo; became at least to some extent detached from its earlier associations: people still worked hard but came to see work as a way to purchase entertainment, more mobility, and greater affluence. &ldquo;Values&rdquo; and &ldquo;lifestyles&rdquo; became changeable and purchasable commodities rather than part of an inherited way of life."},{"t":"p","text":"Northern New England has remained for a longer time more insulated from these changes&mdash;in both their favorable and unfavorable aspects&mdash;than many other parts of the country. Salaries and occupational opportunities remained relatively low, traditional community patterns relatively strong. Now, however, the area is being &ldquo;discovered&rdquo; and pressured from several directions, more or less at the same time. As noted in the panel on economic change and during other phases of the Crossroads Project, the &ldquo;nationalized&rdquo; economy characteristic of postwar America is felt heavily in this region&mdash;national firms moving in with shopping malls, for example. Developmental pressures challenge historic community patterns. At the same time, however, a substantial exodus of former urban or suburban dwellers from parts of &ldquo;Megalopolis&rdquo; is bringing new forces and ideas to the Northern New England region."},{"t":"p","text":"Many of these forces and ideas, while themselves products of postwar America, challenge the &ldquo;standardization&rdquo; of the country and search for &ldquo;more meaningful&rdquo; lifestyles. Part of this search is for a revival of the arts and cultural activities."},{"t":"p","text":"In short, rediscovery of the arts may be seen by many&mdash;as was evident in the fifth Crossroads panel&mdash;as a reaction against the homogenized plasticity of postwar American life. In this context, it is no longer Puritanism which is the opponent of the artist, for Puritanism itself was buried by the consumption society. The arts and genuine cultural activities become a vehicle to escape the standardized boredom of the television culture and the vistas of superficiality which have replaced older, more immobile and traditional communities as a national way of life."},{"t":"p","text":"This new attitude may lead to a dangerous paradox: &ldquo;art&rdquo; and &ldquo;culture&rdquo; themselves may become but another consumption item, divorced not only from any organic tie to a community, but indeed from high artistic aspiration as well. They may be aimed at fulfilling &ldquo;lifestyle&rdquo; needs rather than at genuine artistic achievement. The hope that &ldquo;art&rdquo; and &ldquo;culture&rdquo; could be remedies of some sort for deficiencies in prevailing ways of life might be at the root of such changes. This hope might be not only damaging to
