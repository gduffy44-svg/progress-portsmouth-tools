 artistic aspiration, but could be missing the point entirely, by failing to analyze the economic, political, and social influences on American styles of life."},{"t":"p","text":"A further but related danger is that art and culture may become the preserve of only a segment of the community and fail to be integrated into the actual lives of substantial portions of the population. Indeed, throughout the Crossroads Project it has been apparent that there is a difference of opinion in Portsmouth between those who stress the values of historic preservation, beautification, and revival of community spirit, and those who believe, rightly or wrongly, that these concepts are being defined in a way relevant to the &ldquo;lifestyles&rdquo; and preoccupations of the expatriate &ldquo;newcomers,&rdquo; and not in terms of the &ldquo;ordinary man.&rdquo;"},{"t":"p","text":"While this aspect played less of a role in this evening&rsquo;s discussion than during other panel sessions&mdash;or at least a more subtle role&mdash;it was present. Perhaps it was more subdued because the very vocabulary of an &ldquo;art&rdquo; discussion presupposes a certain type of background which may not have been familiar to all members of the audience. Moreover, the definition of cultural activities tended to be so wide&mdash;including, for example, the presence of new restaurants&mdash;that the problem of &ldquo;culture for the few&rdquo; versus &ldquo;culture for the many&rdquo; became blurred."},{"t":"p","text":"Throughout America, the increased opportunities for consumption have meant also increased travel abroad, and many of the ideas for restaurants and specialty shops so characteristic of the new style of urban redevelopment (emphasizing history and &ldquo;culture&rdquo;) have at least partly a European origin. European impulses have been combined with some deference to American traditions and overlaid with a general patina of &ldquo;chic.&rdquo; This applies particularly to the new &ldquo;restaurant culture&rdquo; and what some have called the &ldquo;hanging ivy against brick wall&rdquo; culture in various parts of the United States."},{"t":"p","text":"Yet while such elements in &ldquo;culture&rdquo; were included in this evening&rsquo;s discussion, more central attention was given to other themes: the financing of the arts, the arts in the education of the young, cooperation among artists and other spokesmen of cultural interests. Most of all, questions already in part sketched the relation of the arts to the local population, whether there is in Portsmouth an &ldquo;indigenous&rdquo; culture to which more attention should be paid, and&mdash;as in the other panel discussions&mdash;how &ldquo;balance&rdquo; is achieved in cultural trends and offerings."},{"t":"p","text":"Overall, it became apparent that Portsmouth has still escaped some of the more cloying aspects of the &ldquo;ivy against brick wall&rdquo; culture, and that much of its cultural renascence has a down-to-earth quality."},{"t":"p","text":"Panelist Jon Kimbell, a dynamic force in Portsmouth&rsquo;s artistic life, pointed out, for example, the broad popular appeal of the summer Prescott Park Arts Festival, not only for city residents but for visitors from surrounding communities. This theatre and music festival, with its summer-long arts classes for children, is the result of an indigenous Portsmouth bequest by Josie Prescott, and the Prescott Fund is managed locally. Theatre by the Sea, of which Kimbell is Producing Director, likewise has pronounced local roots, even if its financing is always less secure."},{"t":"p","text":"Historic preservation and rejuvenation &ldquo;spinoff&rdquo; benefits for the arts, as shown by the example of Panelist Rob Neumer, a craftsman who was attracted to the area because Strawbery Banke offers crafts people shop arrangements as part of its effort to avoid a sterile museum image, creating instead a living museum. The important roster of craftsmen in Portsmouth, both in Strawbery Banke and the harbor areas, is a positive indication of balance between art and a working occupation&mdash;the art is not simply an import to be purveyed, but a working occupation."},{"t":"p","text":"When the discussion turned inevitably to financial considerations, there seemed little evidence that the arts were actually costing the average citizen many dollars. Panelist Kimbell also pointed out the financial benefits to merchants from visitors to theatre and Prescott Park events as well as their payroll monies spent locally. Panelists Cooper and Elwell emphasized increased use of the arts in school programs and explained the federal support of some of these endeavors."},{"t":"p","text":"While there was much concern expressed about the need for cooperation among different cultural and artistic undertakings, the topic of &ldquo;bringing art and culture into relation to the people&rdquo; stirred up more interest. Some of this discussion seemed relatively abstract, as when it touched upon whether the artist should simply respond to popular demands. Panelist Kimbell pointed out that such a limited function would prevent the artist from actually making his special contribution to society. Yet there continued to be uneasiness among some people about the relationship of the artist to the community, and about the degree to which the cultural interests and capabilities of the local citizenry were actually being tapped."},{"t":"p","text":"A somewhat cosmic response to this concern was offered by one audience participant who appeared to argue that it was a mistake to view culture and artistic expression as &ldquo;adjuncts&rdquo; to the rest of one&rsquo;s life, as something somehow separate from the rest of one&rsquo;s life. Instead, &ldquo;the act of living itself makes us all artists,&rdquo; and the inevitable daily round of &ldquo;living&rdquo; was not beyond the definition of any level of aspiration or of any pronouncement. Whether this view of art as something to be discovered in everyday life is attainable without surrendering the high standards of genuine artistic achievement is itself a vexing question."},{"t":"p","text":"In short, the relationship of the arts to the local population, whether there is in Portsmouth an &ldquo;indigenous&rdquo; culture to which more attention should be paid, and how &ldquo;balance&rdquo; is achieved in cultural trends and offerings, remained open questions for further community consideration."},{"t":"p","text":"<em>George K. Romoser</em>"}]},{"id":"m6","kicker":"Sixth Public Meeting &middot; May 25, 1977","title":"Political Institutions and the Citizen in a Changing Portsmouth","kind":"meeting","num":"VI","panelists":["Calvin Canney","Charles Doleac","John Wholey","John Cole"],"place":"Portsmouth Public Library &middot; May 25, 1977","blocks":[{"t":"p","text":"A lively audience greeted panelists Calvin Canney (Portsmouth City Manager), Charles Doleac (attorney and member of the Portsmouth Citizen&rsquo;s Advisory Council), John Wholey (Portsmouth City Councilman), and John Cole (Editor, <em>Maine Times</em>, Topsham, Maine) for a discussion of the functions of government in initiating and managing change."},{"t":"p","text":"As well, press coverage of this final session of the Crossroads Project was broad. The leading headline in the next day&rsquo;s Portsmouth <em>Herald</em> read, &ldquo;PANEL SEEKS ANSWER: WHO REALLY RUNS CITY?&rdquo; In addition, several days later <em>Herald</em> editor George Robinson published a column entitled &ldquo;Modern Tale of Two Cities,&rdquo; outlining some of the issues discussed at the Crossroads panels."},{"t":"p","text":"Much of this press interest was no doubt generated by the presence of noted &ldquo;political&rdquo; figures&mdash;and, in some ways, &ldquo;controversial&rdquo;&mdash;and in the evening&rsquo;s discussion went well beyond real or supposed clashes of the day between Messrs. Canney and Wholey."},{"t":"p","text":"Obviously, these themes relate to many of the earlier Crossroads sessions&mdash;for example, discussions of Market Square beautification, discussions of historic districting and &ldquo;summing-up&rdquo; of many aspects of the Crossroads Project."},{"t":"p","text":"Generally speaking, two areas of discussion and concern emerged, corresponding to central political issues. They may be identified initially in broad strokes:"},{"t":"p","text":"Early in the session, Editor Cole posed two questions: to what extent is Portsmouth showing itself capable of setting its own goals (as distinct from just being &ldquo;pushed along&rdquo; by forces of change), and who actually &ldquo;runs&rdquo; Portsmouth? Perhaps initially deceptive in their simplicity and in Cole&rsquo;s manner of presentation, these questions became starting points as the evening&rsquo;s discussion went well beyond real or supposed clashes of the day between Messrs. Canney and Wholey."},{"t":"p","text":"Former City Council member Evelyn Marconi flatly stated in this session that Portsmouth no longer had &ldquo;representative government&rdquo;; she argued that instead &ldquo;those with time and money&rdquo; made the key decisions. On the other hand, a member of the audience urged that those citizens who were more active and could put together a good case for a proposal would and did achieve results. At least by implication she urged that citizens who felt themselves powerless had only themselves to blame."},{"t":"p","text":"Other panelists and members of the audience offered different perspectives on participation in governmental decisions. Councilman Wholey believed the city is &ldquo;amazingly&rdquo; responsive to citizen pressure if that latter shows itself. He stressed his view that the City Council had brought only sparse attention to soliciting views on expenditure of federal community development funds. Attorney Doleac, on the other hand, stated that some hearings of the Citizen&rsquo;s Advisory Council, designed to solicit views on federal expenditures, had brought only sparse attendance from many parts of the city. Pointing out that residents in certain areas of the city are more active than in others, he urged that Portsmouth consider a return to ward representation, with its assurance of some representation from each &ldquo;area&rdquo; of the community."},{"t":"p","text":"The proper role of special interests&mdash;in the sense of those active on behalf of specific goals&mdash;is clearly related to participation. How do government officials know to whom to respond? Should government respond to the &ldquo;active&rdquo; citizens? Or should it solicit the opinions of a wider spectrum of the citizenry? Should the &ldquo;visibility&rdquo; of special interest groups&mdash;for instance, those interested in tree planting or historic preservation&mdash;slow down action by soliciting the opinions of a wider spectrum?"},{"t":"p","text":"City Manager Canney presented a view of governmental functioning based upon &ldquo;general interest.&rdquo; He argued that special interest groups should present proposed actions to a board of nine members who would then review them in light of overall community interests. He pointed out the necessity for a distinction between policy making and administration; he stated that he had no desire to invade the policy realm. Whether the Manager was doing a good job was ultimately up to the City Council to determine. He said that the City Council was ultimately responsible for reviewing proposed actions of special interest groups and deciding whether they served general community interests."},{"t":"p","text":"Despite the fact that &ldquo;natives&rdquo; and &ldquo;newcomers&rdquo; talk in many ways about the same common topics (knowingly or unknowingly), they are, in fact, talking about &ldquo;who runs Portsmouth?&rdquo; and &ldquo;what are the city&rsquo;s goals?&rdquo; The &ldquo;newer&rdquo; residents speak in broader concerns. They speak to Portsmouth through generalizations about an awareness of change in the nation as a whole. They apply their ideas and experiences to Portsmouth as a whole. The &ldquo;natives,&rdquo; on the other hand, tend to look back to a time when the community and its ways of setting goals were more familiar to them. They are less interested in setting an active agenda of goals than in their wishes for the future, expressed in concrete examples, such as the need for a new swimming pool in Portsmouth."},{"t":"p","text":"Analytically, divergence may be detected between those who have active purposes for historic preservation or Market Square beautification and those who are less interested in an active agenda of community change and look back to a time when the community was more familiar."},{"t":"p","text":"Councilman Wholey pointed out the oft-discussed problems of a core city surrounded by communities with lower tax rates, and noted that the city also benefited economically from its restaurants and cultural sites. Much of this discussion involved one way or another the competition between Portsmouth and the commercial-industrial neighboring community of Newington."},{"t":"p","text":"According to Mr. Wholey, the situation in New Hampshire where the Legislature assures substantial representation of local towns militates especially against regional cooperation. Mr. Doleac tied this concern into the question of local organization, arguing that regional government would in any case be largely irrelevant to the issues the city must confront."},{"t":"p","text":"Panelist Cole, on the other hand, argued that regional government was of growing importance. He saw the trend towards decentralization and towards communities taking their fates in their own hands. He saw this as part of a nationwide phenomenon: the rediscovery of &ldquo;community&rdquo; by rising professional people who want to combine the rediscovery of historical traditions with a concern for education and environment. Whether Portsmouth&rsquo;s &ldquo;natives&rdquo; will be stimulated by and will expand upon these themes remains an open question, a subject for further investigation and discussion."},{"t":"p","text":"These questions, of course, are a part of a nationwide phenomenon. The Crossroads Project attempted to make a modest contribution to the &ldquo;thinking through&rdquo; of these issues by the ordinary citizen of Portsmouth. Whether the project succeeded in this aim is itself a question for the community to answer."},{"t":"p","text":"<em>George K. Romoser</em>"},{"t":"p","text":"<em style=\"display:block;margin-top:2em;padding-top:1.5em;border-top:1px solid var(--border);font-size:13.5px;color:var(--muted)\">All photographs and the cover are used by permission of Strawbery Banke, Inc., Portsmouth, New Hampshire.</em>"}]}],"cast":{"groups":[{"key":"directors","label":"Project Directors"},{"key":"writers","label":"Herald Essayists"},{"key":"panelists","label":"Meeting Panelists"}],"people":[{"id":"romoser","name":"George K. Romoser","group":"directors","role":"Co-director · Professor of Political Science, UNH","tags":["Director","Essayist"],"appears":["dirs","a7","m2","m5","m6"],"bio":"Co-director of the Crossroads Project and a professor of political science at the University of New Hampshire, where he chaired the department from 1968 to 1971. A native of Kingston, New York, he studied at Rutgers and took his Ph.D. at the University of Chicago, and taught in West Germany and at Johns Hopkins' Bologna center. He wrote the closing essay, “Rich Dividends Have Been Won by Change,” and the summaries of three public meetings.","quote":"We of the Western world have lived with change for a long time.","quoteSrc":"a7"},{"id":"lagassa","name":"George K. Lagassa","group":"directors","role":"Co-director · Assistant Professor of Political Science, UNH","tags":["Director","Essayist"],"appears":["dirs","a1","m1","m3"],"bio":"Co-director of the project and a Portsmouth resident who taught American public policy and public administration at UNH. He took his Ph.D. at SUNY Buffalo as a Woodrow Wilson Fellow and researched energy and environmental politics. He opened the series with “Community Choice as if People Mattered” and wrote the summaries of the tourism and historic-preservation meetings.","quote":"Public policy finally and necessarily rests on human judgments and values.","quoteSrc":"a1"},{"id":"clark","name":"Charles E. Clark","group":"writers","role":"Historian, University of New Hampshire","tags":["Essayist","Historian"],"appears":["a2"],"bio":"A member of the UNH History Department and a local historian, he argued that a community planning its future must first know its past. His essay “Old Town Sits on the Brink” traces Portsmouth from a 1664 outpost through its shipbuilding wealth to the present.","quote":"Portsmouth is more than old houses.","quoteSrc":"a2"},{"id":"thoreson","name":"A. Robert Thoreson","group":"writers","role":"Portsmouth Planning Director","tags":["Essayist","Panelist","City staff"],"appears":["a3","m4"],"bio":"As Portsmouth's Planning Director he wrote about local government as a “primary change agent,” describing how zoning, the budget, open-space purchases and a proposed historic-district ordinance encode the community's values. He returned as a panelist on the meeting about paying for public services.","quote":"Need is a perception of multiple actors.","quoteSrc":"m4"},{"id":"kimbell","name":"Jon Kimbell","group":"writers","role":"Producing Director, Theatre by the Sea","tags":["Essayist","Panelist","The arts"],"appears":["a4","m5"],"bio":"Producing director of Theatre by the Sea, he made the case that the arts are a common denominator that crosses lines of age, race, and income — and a working part of Portsmouth's economy, not a luxury. He later joined the panel on the city's changing cultural life.","quote":"This communication is the essence of community.","quoteSrc":"a4"},{"id":"marconi","name":"Evelyn E. Marconi","group":"writers","role":"Former City Councilman · proprietor of Geno’s Coffee Shop","tags":["Essayist","Panelist","Native voice"],"appears":["a5","m2","m3","m6"],"bio":"Born and raised in Portsmouth, a former city councilor and proprietor of Geno’s Coffee Shop, Marconi became the report's most insistent voice for working people and longtime residents. Her essay “One Taxpayer Fears a City Without People” warned that beautification and preservation were pricing out the ordinary citizen, and she carried that argument into the meetings on economic development, historic preservation, and political institutions — defending private property rights and questioning who really decides the city's direction.","quote":"You will have a city with pretty parks, pretty trees, nice sidewalks, theatres, pedestrian malls, all the aesthetics, but alas, no people!","quoteSrc":"a5"},{"id":"richardson","name":"Raymond J. Richardson","group":"writers","role":"Director, Portsmouth Economic Commission","tags":["Essayist","Economic development"],"appears":["a6"],"bio":"Director of the Portsmouth Economic Commission, he argued the city's economic direction is whatever its citizens choose. His essay credits local initiative — the fight to keep the Naval Shipyard and the push for industrial development — with diversifying the economy after years of dependence on government installations.","quote":"Portsmouth can go in any direction it pleases. It all depends upon the desires of its citizens.","quoteSrc":"a6"},{"id":"mceachern","name":"Paul McEachern","group":"panelists","role":"Attorney · Prescott Park & Theatre by the Sea boards","tags":["Panelist","Historic preservation"],"appears":["m3"],"bio":"An attorney serving on the Prescott Park and Theatre by the Sea boards of trustees, McEachern took an economist's view of preservation at the history-and-aesthetics meeting: historic buildings matter, he argued, because they embody a craftsmanship and quality that have become scarce.","quote":"We have historic preservation because we are dealing with an asset which is becoming scarce.","quoteSrc":"m3"},{"id":"brady","name":"Arthur Brady","group":"panelists","role":"Proprietor of Brady Ford · former Mayor · Board Chairman, Strawbery Banke","tags":["Panelist","Tourism"],"appears":["m1"],"bio":"A former mayor, auto dealer, and board chairman of Strawbery Banke, Brady questioned how long anyone has to live in Portsmouth before counting as a “native.”","quote":"What is a native? … I’ve been here eleven years.","quoteSrc":"m1"},{"id":"cordeau","name":"David Cordeau","group":"panelists","role":"Executive Vice-President, Greater Portsmouth Chamber of Commerce","tags":["Panelist","Tourism"],"appears":["m1"],"bio":"The chamber's executive vice-president told the first meeting that tourism accounted for about 18% of seacoast wages and 12% of seacoast jobs, while acknowledging a perception that the boards governing historic attractions were an elite.","quote":"","quoteSrc":""},{"id":"cabrera","name":"Alfonso Cabrera","group":"panelists","role":"Proprietor, Al’s Barber Shop","tags":["Panelist","Tourism"],"appears":["m1"],"bio":"A downtown barber, Cabrera argued that far from threatening community identity, tourism had strengthened Portsmouth's sense of itself by drawing visitors to its old homes and maritime character.","quote":"","quoteSrc":""},{"id":"chase","name":"Robert Chase","group":"panelists","role":"Consultant and property owner, Portsmouth & Newburyport","tags":["Panelist","Tourism"],"appears":["m1"],"bio":"A consultant and property owner who pushed back on the idea that any one group must control the city's identity.","quote":"A community can be enjoyed by anyone. I don’t think anyone has to take over.","quoteSrc":"m1"},{"id":"getchell","name":"Gary Getchell","group":"panelists","role":"Proprietor, Paterson & Getchell Paint & Decorating","tags":["Panelist","Downtown"],"appears":["m2"],"bio":"A downtown merchant who supported Strawbery Banke but worried about a “fever” for preservation crowding out everyday commerce; he wanted downtown to remain a place to run ordinary errands.","quote":"…a place where one can buy a set of underwear and a flashlight.","quoteSrc":"m2"},{"id":"grammas","name":"John Grammas","group":"panelists","role":"Owner, Two Brewers Steak House","tags":["Panelist","Downtown"],"appears":["m2"],"bio":"A restaurateur on the edge of the city who spoke about the human need for “places for people to go” — to meet, especially the young and the senior citizen.","quote":"","quoteSrc":""},{"id":"low","name":"Melvin Low","group":"panelists","role":"Vice-President & Mortgage Officer, Portsmouth Trust Company","tags":["Panelist","Downtown"],"appears":["m2"],"bio":"A banker who placed downtown Portsmouth within national economic forces, noting how regional shopping centers draw customers away from city centers.","quote":"Downtown Portsmouth is just another shopping center trying to survive.","quoteSrc":"m2"},{"id":"vanbilliard","name":"Russell van Billiard","group":"panelists","role":"Portsmouth Economic Commission","tags":["Panelist","Downtown"],"appears":["m2"],"bio":"A member of the Economic Commission who reviewed the just-approved Market Square Project and the regional context shaping Portsmouth's commercial future.","quote":"","quoteSrc":""},{"id":"aeschliman","name":"Nicholas Aeschliman","group":"panelists","role":"City Councilman · attorney","tags":["Panelist","Historic preservation"],"appears":["m3"],"bio":"A city councilor and attorney who argued the community, through an appropriate agency, should have a say in what happens to the downtown buildings that make Portsmouth distinctive.","quote":"Portsmouth can not afford to leave the decision of its townscape … totally in private control.","quoteSrc":"m3"},{"id":"armitage","name":"Margaret Armitage","group":"panelists","role":"Director, Strawbery Banke","tags":["Panelist","Historic preservation"],"appears":["m3"],"bio":"Director of Strawbery Banke, she pointed to the museum's economic benefits to Portsmouth and to its work interpreting the past for the public.","quote":"","quoteSrc":""},{"id":"loughlin","name":"Peter Loughlin","group":"panelists","role":"Former City Attorney","tags":["Panelist","Taxes & growth"],"appears":["m4"],"bio":"A former city attorney who used apartment assessments to show that new multi-family housing does not always pay its own way once schools and services are counted.","quote":"","quoteSrc":""},{"id":"marple","name":"Jeffrey A. Marple","group":"panelists","role":"Local real estate broker","tags":["Panelist","Taxes & growth","Housing"],"appears":["m4"],"bio":"A real-estate broker who said the single largest demand he saw was for apartments, and that the cost of housing had been pushed beyond many families' reach by forces well outside Portsmouth.","quote":"The single largest demand of realtors is for apartments.","quoteSrc":"m4"},{"id":"hanrahan","name":"Joyce Hanrahan","group":"panelists","role":"City Councilman · former School Board member","tags":["Panelist","Taxes & growth"],"appears":["m4"],"bio":"A city councilor and former school-board member who defended spending on Market Square improvements, noting such projects had succeeded in hundreds of other downtowns.","quote":"Similar improvements … have occurred in about 600 places across the country.","quoteSrc":"m4"},{"id":"cooper","name":"Lee Cooper","group":"panelists","role":"Director, Title I educational project","tags":["Panelist","The arts"],"appears":["m5"],"bio":"Director of a Title I educational project, she joined the discussion of how the arts reach into the schools and the wider community.","quote":"","quoteSrc":""},{"id":"elwell","name":"William Elwell","group":"panelists","role":"Director of art and music, Portsmouth schools","tags":["Panelist","The arts"],"appears":["m5"],"bio":"The schools' director of art and music, who spoke to the place of arts education in the city.","quote":"","quoteSrc":""},{"id":"neumer","name":"Rob Neumer","group":"panelists","role":"Leather craftsman, Strawbery Banke","tags":["Panelist","The arts","Craft"],"appears":["m5"],"bio":"A leather craftsman drawn to Portsmouth because Strawbery Banke offered working shops — evidence, the report notes, that craft can be a living occupation rather than a museum display.","quote":"","quoteSrc":""},{"id":"canney","name":"Calvin Canney","group":"panelists","role":"City Manager","tags":["Panelist","Government"],"appears":["m6"],"bio":"Portsmouth's city manager, who argued that special-interest groups should not be allowed to drive the decisions of the elected council.","quote":"","quoteSrc":""},{"id":"cole","name":"John Cole","group":"panelists","role":"Editor, Maine Times","tags":["Panelist","Government","Press"],"appears":["m6"],"bio":"Editor of the Maine Times, who pressed the final panel on how a small city can keep setting its own goals while being “pushed along” by larger forces.","quote":"","quoteSrc":""},{"id":"doleac","name":"Charles Doleac","group":"panelists","role":"Attorney · Portsmouth Citizens’ Advisory Council","tags":["Panelist","Government"],"appears":["m6"],"bio":"An attorney and member of the Citizens' Advisory Council, part of the final discussion of government and the citizen in a changing Portsmouth.","quote":"","quoteSrc":""},{"id":"wholey","name":"John Wholey","group":"panelists","role":"City Councilman, later Mayor","tags":["Panelist","Government"],"appears":["m6","intro"],"bio":"A city councilor who became mayor; the directors counted his regret that the full council had not attended every session as the strongest compliment paid the project.","quote":"","quoteSrc":""}]}};

    project:CR.sections.filter(function(s){return s.kind==='front';}),
    essays: CR.sections.filter(function(s){return s.kind==='essay';}),

    project:{card:'N',rose:'Origin',label:'The Project',count:GROUPS.project.length+' documents',

      dek:'Seven citizens argued the town\u2019s future in the Portsmouth Herald, week by week, in early 1977.'},

  };

  /* ---------------- compass SVG ---------------- */
  function compassSVG(){
    var ticks='';
    for(var i=0;i<72;i++){
      var a=i*5, maj=(a%90===0), mid=(a%45===0);
      var r1=maj?70:(mid?74:77), r2=82;
      var rad=(a-90)*Math.PI/180;
      var x1=100+r1*Math.cos(rad), y1=100+r1*Math.sin(rad);
      var x2=100+r2*Math.cos(rad), y2=100+r2*Math.sin(rad);
      ticks+='<line x1="'+x1.toFixed(1)+'" y1="'+y1.toFixed(1)+'" x2="'+x2.toFixed(1)+'" y2="'+y2.toFixed(1)+'" stroke="'+(maj?'var(--brass-2)':'var(--ink-line)')+'" stroke-width="'+(maj?2:1)+'"/>';
    }
    // 8-point star (rose)
    function star(outer,inner,rot,fill,op){
      var pts=[];for(var k=0;k<8;k++){var ang=(k*45+rot-90)*Math.PI/180;var r=(k%2===0)?outer:inner;pts.push((100+r*Math.cos(ang)).toFixed(1)+','+(100+r*Math.sin(ang)).toFixed(1));}
      return '<polygon points="'+pts.join(' ')+'" fill="'+fill+'" opacity="'+op+'"/>';
    }
    return ''+
    '<svg viewBox="0 0 200 200" aria-hidden="true">'+
      '<circle cx="100" cy="100" r="88" fill="none" stroke="var(--brass)" stroke-width="1.5" opacity=".6"/>'+
      '<circle cx="100" cy="100" r="82" fill="none" stroke="var(--ink-line)" stroke-width="1"/>'+
      ticks+
      star(58,16,22.5,'var(--ink-line)',.55)+   /* inter-cardinal points, recessed */
      star(66,14,0,'var(--brass)',.30)+          /* cardinal star body */
      // north half accented magenta
      '<polygon points="100,34 86,100 100,100" fill="var(--magenta)"/>'+
      '<polygon points="100,34 114,100 100,100" fill="var(--magenta-deep)"/>'+
      '<circle cx="100" cy="100" r="9" fill="var(--ink)" stroke="var(--brass-2)" stroke-width="1.5"/>'+
      '<g font-family="Public Sans,sans-serif" font-size="9" font-weight="700" fill="var(--brass-2)" text-anchor="middle">'+
        '<text x="100" y="14">N</text><text x="190" y="103">E</text>'+
        '<text x="100" y="197">S</text><text x="11" y="103">W</text>'+
      '</g>'+
      // rotating needle
      '<g class="needle" id="needle">'+
        '<polygon points="100,40 95,100 105,100" fill="var(--magenta)"/>'+
        '<polygon points="100,160 95,100 105,100" fill="var(--on-ink-dim)"/>'+
        '<circle cx="100" cy="100" r="4.5" fill="var(--brass-2)"/>'+
      '</g>'+
    '</svg>';
  }
  var NEEDLE_DEG={project:0,essays:90,meetings:180,voices:270};

  /* ---------------- HOME ---------------- */
  function buildHome(){
    var v=el('section','view active');v.id='v-home';
    var veil=el('div','map-veil');if(HERO)veil.style.setProperty('--veil-img','url('+HERO+')');
    v.appendChild(veil);

    var inn=el('div','home-in');

    inn.appendChild(el('div','pp-mark','<span class="d">&#9670;</span> Progress Portsmouth'));

    var mast=el('div','masthead');
    mast.innerHTML=
      '<div class="org eyebrow">'+META.org+'</div>'+
      '<h1>Portsmouth at<br>the <span class="crux">Crossroads</span></h1>'+
      '<p class="sub">'+META.subtitle+'</p>'+
      '<div class="stamp">'+META.heraldRange+'</div>';
    inn.appendChild(mast);

    var prov=el('div','provenance');
    prov.innerHTML='<span class="prov-k">What you&rsquo;re reading</span>'+
      'The 1978 report reproduced in full &mdash; seven <em>Herald</em> essays and six public-meeting summaries, word for word. The compass navigation, the five tensions drawn out below, the short notes on each voice, and the links to today&rsquo;s planning are added by Progress Portsmouth.';
    inn.appendChild(prov);

    var bridge=el('div','bridge');
    bridge.innerHTML=
      '<div class="bridge-eyebrow">Then &amp; Now</div>'+
      '<div class="bridge-dates">'+
        '<div class="bd-node then"><span class="bd-yr">1977</span><span class="bd-lbl">The Crossroads Project</span></div>'+
        '<div class="bd-track"></div>'+
        '<div class="bd-node now"><span class="bd-yr">2026</span><span class="bd-lbl">Master Plan &amp; Housing Action Plan</span></div>'+
      '</div>'+
      '<p class="bridge-copy">Nearly fifty years ago, Portsmouth argued over what kind of place it should become \u2014 in seven Herald essays and six public meetings, gathered into a single report in 1978. The city is deciding again today, through its Master Plan and Housing Action Plan. The questions have barely changed.</p>';
    inn.appendChild(bridge);

    // compass
    var stage=el('div','compass-stage');
    stage.innerHTML=compassSVG();
    var hub=el('div','compass-hub');
    hub.innerHTML='<div class="hub-k">Report</div><div class="hub-yr">1978</div><div class="hub-k">est. 1977</div>';
    stage.appendChild(hub);
    inn.appendChild(stage);
    inn.appendChild(el('p','helper','Set a course — choose a heading'));

    var grid=el('div','bearings');
    ['project','essays','meetings','voices'].forEach(function(key){
      var b=BEAR[key];
      var btn=el('button','bearing');
      btn.id='bear-'+key;
      btn.setAttribute('aria-label','Set course to '+b.label+', '+b.count);
      btn.innerHTML='<span class="b-rose">'+b.card+'</span><span class="b-card">'+b.label+'</span><span class="b-count">'+b.count+'</span>';
      btn.addEventListener('click',function(){setCourse(key);});
      grid.appendChild(btn);
    });
    inn.appendChild(grid);

    // tensions spine
    var spine=el('div','spine');
    spine.innerHTML='<h2>What the town argued about</h2><p class="spine-dek">Five tensions ran through every essay and meeting in 1977. They are still the argument today.</p>';
    META.tensions.forEach(function(t){
      var hasDetail=t.id&&TD[t.id];
      var row=el(hasDetail?'button':'div','tension'+(hasDetail?' is-link':''));
      row.innerHTML='<span class="pole a">'+t.a+'</span><span class="vs">vs</span><span class="pole b">'+t.b+'</span><span class="topic">'+t.topic+'<span class="t-go">explore &rarr;</span></span>';
      if(hasDetail){
        row.setAttribute('aria-label','Explore the tension: '+t.a+' versus '+t.b);
        row.addEventListener('click',function(){go('tension/'+t.id);});
      }
      spine.appendChild(row);
    });
    inn.appendChild(spine);

    var colo=el('div','colophon');
    colo.innerHTML='Originally published '+META.published+' by the '+META.org+', with support from the '+META.funder+'. '+META.copies+'<br>Re&euml;dited for the web by <span class="pp">'+META.host+'</span>. The arguments are nearly fifty years old; the crossroads is still here.';
    inn.appendChild(colo);

    v.appendChild(inn);
    return v;
  }

  var _pendingCourse=null;
  function setCourse(key){
    // mark target, swing needle, then route after the swing
    document.querySelectorAll('.bearing').forEach(function(b){b.classList.remove('is-target');});
    var btn=document.getElementById('bear-'+key);if(btn)btn.classList.add('is-target');
    var needle=document.getElementById('needle');
    var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(needle&&!reduce){
      needle.style.transform='rotate('+NEEDLE_DEG[key]+'deg)';
      clearTimeout(_pendingCourse);
      _pendingCourse=setTimeout(function(){go(key==='voices'?'voices':key);},620);
    }else{
      go(key==='voices'?'voices':key);
    }
  }

  /* ---------------- INDEX (project/essays/meetings) ---------------- */
  function buildIndex(key){
    var b=BEAR[key], list=GROUPS[key];
    var v=el('section','view');v.id='v-'+key;
    v.appendChild(topbar(b.label));
    var w=el('div','wrap');
    var head=el('div','index-head');
    head.innerHTML='<div class="eyebrow">Heading '+b.card+' &middot; '+b.count+'</div><h2>'+b.label+'</h2><p>'+b.dek+'</p>';
    w.appendChild(head);
    var ul=el('div','list');
    list.forEach(function(s){
      var btn=el('button','entry');
      btn.innerHTML=
        '<div class="e-date">'+s.kicker+'</div>'+
        '<div class="e-title">'+s.title+'</div>'+
        (s.by&&s.by!=='-'?'<div class="e-by">'+s.by+'</div>':'');
      btn.addEventListener('click',function(){go('read/'+s.id);});
      ul.appendChild(btn);
    });
    w.appendChild(ul);
    v.appendChild(w);
    return v;
  }

  /* ---------------- VOICES ---------------- */
  function buildVoices(){
    var v=el('section','view');v.id='v-voices';
    v.appendChild(topbar('The Voices'));
    var w=el('div','wrap');
    var head=el('div','index-head');
    head.innerHTML='<div class="eyebrow">Heading W &middot; '+CR.cast.people.length+' people</div><h2>The Voices</h2><p>'+BEAR.voices.dek+'</p>';
    w.appendChild(head);
    var grid=el('div','voices');
    CR.cast.groups.forEach(function(g){
      grid.appendChild(el('div','group-label',g.label));
      CR.cast.people.filter(function(p){return p.group===g.key;}).forEach(function(p){
        var btn=el('button','voice');
        btn.innerHTML='<div class="v-name">'+p.name+'</div><div class="v-role">'+p.role+'</div>'+
          (p.tags&&p.tags.length?'<div class="v-tags">'+p.tags.map(function(t){return '<span class="v-tag">'+t+'</span>';}).join('')+'</div>':'');
        btn.addEventListener('click',function(){openPerson(p.id);});
        grid.appendChild(btn);
      });
    });
    w.appendChild(grid);
    v.appendChild(w);
    return v;
  }

  /* ---------------- READING ---------------- */
  function buildRead(id){
    var s=byId(id);if(!s)return null;
    var v=el('section','view');v.id='v-read';
    v.appendChild(topbar(s.kicker.replace(/&middot;.*/,'').trim()||'Reading',true));
    var body=el('article','read-body');
    var headHtml='<div class="read-kicker">'+s.kicker+'</div><h1 class="read-title">'+s.title+'</h1>';
    if(s.by&&s.by!=='-')headHtml+='<div class="read-by">'+s.by+'</div>';
    body.innerHTML=headHtml;
    var firstP=true;
    s.blocks.forEach(function(bk){
      if(bk.t==='p'){var p=el('p',firstP&&s.kind==='essay'?'lead-cap':null,bk.text);firstP=false;body.appendChild(p);}
      else if(bk.t==='h'){body.appendChild(el('h3',null,bk.text));}
      else if(bk.t==='editor'){var en=el('div','editor-note');en.innerHTML='<span class="en-tag">Portsmouth Herald &middot; original 1977 note</span>'+bk.text;body.appendChild(en);}
      else if(bk.t==='quote'){body.appendChild(el('blockquote','pullquote',bk.text));}
      else if(bk.t==='list'){var ul=el('ul');(bk.items||[]).forEach(function(it){ul.appendChild(el('li',null,it));});body.appendChild(ul);}
      else if(bk.t==='callout'){
        if((bk.label&&bk.label.trim())||(bk.paras&&bk.paras.length)){
          var c=el('div','callout');if(bk.label&&bk.label.trim())c.appendChild(el('div','c-label',bk.label));
          (bk.paras||[]).forEach(function(pp){c.appendChild(el('p',null,pp));});body.appendChild(c);
        }
      }
      else if(bk.t==='bio'){var bi=el('div','bio');if(bk.h)bi.appendChild(el('div','bio-h',bk.h));(bk.paras||[]).forEach(function(pp){bi.appendChild(el('p',null,pp));});body.appendChild(bi);}
      else if(bk.t==='figure'){
        var f=el('figure');var img=el('img');img.src=bk.src;img.alt=bk.caption||'';img.loading='lazy';f.appendChild(img);
        var cap=bk.caption||'';if(bk.credit)cap+='<span class="credit">'+bk.credit+'</span>';
        if(cap)f.appendChild(el('figcaption',null,cap));
        body.appendChild(f);
      }
    });
    v.appendChild(body);
    var tail=el('div','read-tail');
    var back=el('button','return','<span>&#9650;</span> Back to the compass');
    back.addEventListener('click',function(){go('');});
    tail.appendChild(back);
    v.appendChild(tail);
    return v;
  }

  /* ---------------- TENSION DETAIL ---------------- */
  function refLabel(sid){
    var s=byId(sid);if(!s)return '';
    if(s.kind==='essay'){var i=GROUPS.essays.indexOf(s);return 'Essay '+(i+1);}
    if(s.kind==='meeting'){return 'Meeting '+(s.num||'');}
    return s.title;
  }
  function voiceCard(vc){
    var s=byId(vc.sid);
    var b=el('button','vcard');
    var body=vc.q
      ? '<span class="vc-quote">&ldquo;'+vc.text+'&rdquo;</span>'
      : '<span class="vc-para">'+vc.text+'</span>';
    b.innerHTML=body+
      '<span class="vc-attr"><span class="vc-who">'+vc.who+'</span>'+
      '<span class="vc-ref">'+refLabel(vc.sid)+(s?' &middot; '+s.title:'')+' <span class="vc-arr">&rarr;</span></span></span>';
    b.addEventListener('click',function(){go('read/'+vc.sid);});
    return b;
  }
  function buildTension(id){
    var t=null;META.tensions.forEach(function(x){if(x.id===id)t=x;});
    var d=TD[id];
    if(!t||!d)return null;
    var v=el('section','view');v.id='v-tension';
    v.appendChild(topbar(t.topic));
    var w=el('div','wrap');

    var head=el('div','index-head t-head');
    head.innerHTML='<div class="eyebrow">What the town argued about</div>'+
      '<h2 class="t-h2"><span class="t-pole-a">'+t.a+'</span><span class="t-amp">&#8596;</span><span class="t-pole-b">'+t.b+'</span></h2>'+
      '<p>'+d.intro+'</p>';
    w.appendChild(head);

    var tprov=el('p','t-provenance');
    tprov.innerHTML='Quotations below are from the 1977 record. Sorting the voices into two sides &mdash; and the connections drawn between them &mdash; are Progress Portsmouth&rsquo;s.';
    w.appendChild(tprov);

    var cols=el('div','poles');
    [['a',t.a,d.A],['b',t.b,d.B]].forEach(function(pair){
      var col=el('div','pole-col pole-'+pair[0]);
      col.appendChild(el('div','pole-cap',pair[1]));
      pair[2].forEach(function(vc){col.appendChild(voiceCard(vc));});
      cols.appendChild(col);
    });
    w.appendChild(cols);

    if(d.note){
      var note=el('div','t-note');
      note.innerHTML='<p>'+d.note+'</p>';
      if(d.noteSid){
        var nl=el('button','t-note-link',refLabel(d.noteSid)+' &middot; '+byId(d.noteSid).title+' <span class="vc-arr">&rarr;</span>');
        nl.addEventListener('click',function(){go('read/'+d.noteSid);});
        note.appendChild(nl);
      }
      w.appendChild(note);
    }

    var ap=el('div','t-appears');
    ap.appendChild(el('div','sa-k','Where this surfaced'));
    (d.appears||[]).forEach(function(sid){
      var s=byId(sid);if(!s)return;
      var btn=el('button','t-ap-link');
      btn.innerHTML='<span class="ta-tag">'+refLabel(sid)+'</span><span class="ta-title">'+s.title+'</span>';
      btn.addEventListener('click',function(){go('read/'+sid);});
      ap.appendChild(btn);
    });
    w.appendChild(ap);

    v.appendChild(w);
    var tail=el('div','read-tail');
    var back=el('button','return','<span>&#9650;</span> Back to the compass');
    back.addEventListener('click',function(){go('');});
    tail.appendChild(back);
    v.appendChild(tail);
    return v;
  }

  function topbar(here,paper){
    var bar=el('header','topbar'+(paper?' on-paper':''));
    var back=el('button','back','<span class="arrow">&#8592;</span> Compass');
    back.addEventListener('click',function(){go('');});
    bar.appendChild(back);
    bar.appendChild(el('span','here',here));
    return bar;
  }

  /* ---------------- person modal ---------------- */
  function openPerson(id){
    var p=personById(id);if(!p)return;
    var appears=(p.appears||[]).map(function(sid){return byId(sid);}).filter(Boolean);
    var html='<div class="sheet-top"><h3 id="sheet-name">'+p.name+'</h3><button class="x" aria-label="Close">&times;</button></div>'+
      '<div class="s-role">'+p.role+'</div>'+
      '<div class="s-bio">'+(p.bio?'<p>'+p.bio.split('\n').join('</p><p>')+'</p>':'<p>Listed in the record of the project.</p>')+'</div>';
    if(appears.length){
      html+='<div class="s-appears"><div class="sa-k">Appears in</div>';
      appears.forEach(function(s){
        html+='<button class="sa-link" data-sid="'+s.id+'"><span class="sa-date">'+s.kicker.replace(/<[^>]+>/g,'')+'</span>'+s.title+'</button>';
      });
      html+='</div>';
    }
    sheet.innerHTML=html;
    sheet.querySelector('.x').addEventListener('click',closeSheet);
    sheet.querySelectorAll('.sa-link').forEach(function(b){
      b.addEventListener('click',function(){closeSheet();go('read/'+b.getAttribute('data-sid'));});
    });
    scrim.classList.add('open');
    document.body.style.overflow='hidden';
    sheet.querySelector('.x').focus();
  }
  function closeSheet(){scrim.classList.remove('open');document.body.style.overflow='';}
  scrim.addEventListener('click',function(e){if(e.target===scrim)closeSheet();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet();});

  /* ---------------- router ---------------- */
  function go(route){location.hash=route?('#/'+route):'#/';}
  function render(){
    var hash=location.hash.replace(/^#\/?/,'');
    var view;
    if(hash.indexOf('read/')===0){view=buildRead(hash.slice(5));}
    else if(hash.indexOf('tension/')===0){view=buildTension(hash.slice(8));}
    else if(hash==='essays'){view=buildIndex('essays');}
    else if(hash==='meetings'){view=buildIndex('meetings');}
    else if(hash==='project'){view=buildIndex('project');}
    else if(hash==='voices'){view=buildVoices();}
    if(!view){view=buildHome();}
    view.classList.add('active');
    app.innerHTML='';app.appendChild(view);
    window.scrollTo(0,0);
    closeSheet();
    // if returning home, settle needle to north
    if(view.id==='v-home'){var n=document.getElementById('needle');if(n)n.style.transform='rotate(0deg)';}
  }
  window.addEventListener('hashchange',render);
  render();
})();
</script>
</body>
</html>
