<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Portsmouth at the Crossroads · 1977–78</title>
<meta name="description" content="A 1977–78 civic record of Portsmouth, New Hampshire, arguing about its own future — seven Herald essays, six public meetings, and the people who spoke. Presented by Progress Portsmouth.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   PORTSMOUTH AT THE CROSSROADS — compass navigator
   Palette: nautical chart. Ink ground, chart-buff paper,
   NOAA chart magenta accent, sounding blue, instrument brass.
   ============================================================ */
:root{
  --ink:#10242E;          /* deep harbor — hero/compass ground */
  --ink-2:#173541;        /* raised ink */
  --ink-line:#2C4A56;     /* hairlines on ink */
  --paper:#ECE4D2;        /* chart buff — reading ground */
  --paper-2:#E3D8C0;      /* chart land tint */
  --paper-line:#CDBF9F;   /* rules on paper */
  --magenta:#C73F2A;      /* navigational red — the accent (port light / compass north) */
  --magenta-deep:#9E3320;
  --sounding:#5E8499;     /* chart water blue — secondary */
  --brass:#B8924A;        /* instrument brass */
  --brass-2:#D8B66E;
  --on-ink:#EFE7D6;       /* text on ink */
  --on-ink-dim:#9FB3BB;
  --on-paper:#22323A;     /* text on paper */
  --on-paper-dim:#6A6354;
  --ff-display:"Fraunces",Georgia,serif;
  --ff-body:"Newsreader",Georgia,serif;
  --ff-ui:"Public Sans",system-ui,sans-serif;
  --maxw:760px;
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--ink);
  color:var(--on-ink);
  font-family:var(--ff-body);
  font-size:18px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow-x:hidden;
}
img{max-width:100%;display:block}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;margin:0}
a{color:var(--magenta)}
:focus-visible{outline:2.5px solid var(--brass-2);outline-offset:3px;border-radius:2px}

.ui{font-family:var(--ff-ui)}
.eyebrow{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.18em;font-size:12px;font-weight:600}

/* ---------- view machinery ---------- */
.view{display:none;min-height:100svh;min-height:100vh}
.view.active{display:block}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

/* ============================================================
   HOME — the compass hub
   ============================================================ */
#v-home{
  position:relative;
  display:flex;flex-direction:column;
  align-items:center;
  padding:34px 18px 54px;
  background:
    radial-gradient(120% 80% at 50% -10%, var(--ink-2) 0%, var(--ink) 55%);
}
.map-veil{
  position:absolute;top:0;left:0;right:0;height:680px;
  background-image:
    linear-gradient(180deg, rgba(16,36,46,.86) 0%, rgba(16,36,46,.90) 55%, var(--ink) 100%),
    var(--veil-img);
  background-size:cover;background-position:50% 18%;
  filter:grayscale(.35) sepia(.25);
  pointer-events:none;z-index:0;
  -webkit-mask-image:linear-gradient(180deg,#000 60%,transparent 100%);
          mask-image:linear-gradient(180deg,#000 60%,transparent 100%);
}
.home-in{position:relative;z-index:1;width:100%;max-width:560px;display:flex;flex-direction:column;align-items:center}

.masthead{text-align:center;margin-bottom:6px}
.masthead .org{color:var(--brass-2);margin-bottom:14px;display:flex;gap:9px;align-items:center;justify-content:center}
.masthead .org::before,.masthead .org::after{content:"";height:1px;width:26px;background:var(--brass)}
.masthead h1{
  font-family:var(--ff-display);
  font-weight:900;
  font-optical-sizing:auto;
  font-size:clamp(40px,13vw,72px);
  line-height:.92;
  letter-spacing:-.015em;
  margin:0;color:var(--on-ink);
}
.masthead h1 .crux{color:var(--magenta);font-style:italic;font-weight:600}
.masthead .sub{
  font-family:var(--ff-body);font-style:italic;
  color:var(--on-ink-dim);font-size:clamp(15px,4.4vw,19px);
  margin:12px 0 0;
}
.masthead .stamp{
  margin:16px auto 0;display:inline-block;
  font-family:var(--ff-ui);font-weight:700;letter-spacing:.04em;
  font-size:12px;color:var(--brass-2);
  border:1.5px solid var(--brass);border-radius:999px;
  padding:5px 14px;
}

/* compass */
.compass-stage{
  position:relative;width:min(74vw,330px);aspect-ratio:1/1;margin:24px auto 26px;
}
.compass-stage svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
.needle{transform-box:fill-box;transform-origin:center;transition:transform .85s var(--ease)}
@media (prefers-reduced-motion:reduce){.needle{transition:none}}

.compass-hub{
  position:absolute;z-index:2;top:50%;left:50%;transform:translate(-50%,-50%);
  width:40%;height:40%;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle at 50% 35%,var(--ink-2),var(--ink));
  border:1.5px solid var(--brass);
}
.compass-hub .hub-k{font-family:var(--ff-ui);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--on-ink-dim)}
.compass-hub .hub-yr{font-family:var(--ff-display);font-weight:900;font-size:clamp(20px,8vw,28px);line-height:1;color:var(--brass-2)}

.helper{font-family:var(--ff-ui);font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--on-ink-dim);text-align:center;margin:0 0 18px}

/* four headings — grid beneath the compass */
.bearings{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:430px;margin:0 auto;
}
.bearing{
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  padding:14px 15px;border-radius:13px;text-align:left;
  background:var(--ink-2);border:1px solid var(--ink-line);
  transition:transform .18s var(--ease),border-color .18s,background .18s;
}
.bearing:hover{transform:translateY(-3px);border-color:var(--brass)}
.bearing:active{transform:translateY(-1px)}
.bearing .b-rose{
  font-family:var(--ff-ui);font-weight:700;font-size:11px;letter-spacing:.1em;
  color:var(--ink);background:var(--brass-2);border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px;
}
.bearing .b-card{font-family:var(--ff-display);font-weight:600;font-size:20px;line-height:1;color:var(--on-ink)}
.bearing .b-count{font-family:var(--ff-ui);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--on-ink-dim)}
.bearing.is-target{background:var(--ink);border-color:var(--magenta)}
.bearing.is-target .b-card{color:var(--magenta)}
.bearing.is-target .b-rose{background:var(--magenta);color:var(--on-ink)}

/* then & now bridge */
.bridge{
  width:100%;max-width:540px;margin:18px auto 4px;
  padding:20px 22px 18px;border-radius:14px;
  background:color-mix(in srgb,var(--ink-2) 78%, transparent);
  border:1px solid var(--ink-line);
}
.bridge-eyebrow{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.2em;font-weight:700;font-size:11px;color:var(--brass-2);text-align:center;margin-bottom:16px}
.bridge-dates{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.bd-node{flex:0 0 auto;max-width:42%;display:flex;flex-direction:column;gap:3px}
.bd-node.then{text-align:left}
.bd-node.now{text-align:right;margin-left:auto}
.bd-yr{font-family:var(--ff-display);font-weight:900;font-size:30px;line-height:1}
.then .bd-yr{color:var(--brass-2)}
.now .bd-yr{color:var(--magenta)}
.bd-lbl{font-family:var(--ff-ui);font-size:11px;line-height:1.35;letter-spacing:.04em;color:var(--on-ink-dim);text-transform:uppercase}
.bd-track{flex:1 1 auto;height:0;border-top:1.5px solid var(--brass);position:relative;align-self:flex-start;margin-top:13px;min-width:24px}
.bd-track::after{content:"";position:absolute;right:-1px;top:-4.5px;border-left:8px solid var(--brass);border-top:4.5px solid transparent;border-bottom:4.5px solid transparent}
.bridge-copy{font-family:var(--ff-body);font-size:16px;line-height:1.55;color:var(--on-ink);text-align:center;margin:0}

/* tensions — the thematic spine */
.spine{width:100%;max-width:560px;margin:40px auto 0;border-top:1px solid var(--ink-line);padding-top:24px}
.spine h2{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.18em;font-size:12px;font-weight:700;color:var(--brass-2);text-align:center;margin:0 0 4px}
.spine .spine-dek{font-family:var(--ff-body);font-style:italic;color:var(--on-ink-dim);text-align:center;font-size:15px;margin:0 0 20px}
.tension{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--ink-line)}
.tension:last-child{border-bottom:none}
.tension .pole{font-family:var(--ff-body);font-size:16px;line-height:1.25}
.tension .pole.a{text-align:right}
.tension .pole.b{text-align:left;color:var(--on-ink-dim)}
.tension .vs{
  font-family:var(--ff-ui);font-size:10px;font-weight:700;letter-spacing:.1em;
  color:var(--ink);background:var(--brass-2);border-radius:999px;
  width:30px;height:18px;display:flex;align-items:center;justify-content:center;
}
.tension .topic{grid-column:1/-1;font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.14em;font-size:10px;color:var(--sounding);text-align:center;margin-top:3px}

.colophon{margin:38px auto 0;text-align:center;font-family:var(--ff-ui);font-size:11.5px;line-height:1.7;letter-spacing:.02em;color:var(--on-ink-dim);max-width:460px}

/* ============================================================
   INDEX VIEWS (essays / meetings / voices / project)
   ============================================================ */
.topbar{
  position:sticky;top:0;z-index:20;
  display:flex;align-items:center;gap:12px;
  padding:12px 18px;
  background:color-mix(in srgb,var(--ink) 86%,transparent);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--ink-line);
}
.topbar.on-paper{
  background:color-mix(in srgb,var(--paper) 88%,transparent);
  border-bottom:1px solid var(--paper-line);
  color:var(--on-paper);
}
.back{display:inline-flex;align-items:center;gap:7px;font-family:var(--ff-ui);font-weight:600;font-size:14px;letter-spacing:.01em}
.back .arrow{font-size:17px;line-height:1}
.topbar .here{font-family:var(--ff-ui);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--on-ink-dim);margin-left:auto}
.topbar.on-paper .here{color:var(--on-paper-dim)}

.index-head{padding:38px 0 8px;text-align:center}
.index-head .eyebrow{color:var(--brass-2)}
.index-head h2{font-family:var(--ff-display);font-weight:900;font-size:clamp(30px,9vw,46px);line-height:1;margin:10px 0 8px;color:var(--on-ink)}
.index-head p{font-family:var(--ff-body);font-style:italic;color:var(--on-ink-dim);max-width:460px;margin:0 auto;font-size:16px}

.list{padding:18px 0 60px}
.entry{
  display:block;width:100%;text-align:left;
  padding:20px 4px;border-bottom:1px solid var(--ink-line);
  transition:padding-left .25s var(--ease);
}
.entry:hover{padding-left:12px}
.entry .e-date{font-family:var(--ff-ui);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--sounding);margin-bottom:7px}
.entry .e-title{font-family:var(--ff-display);font-weight:600;font-size:clamp(20px,5.6vw,26px);line-height:1.12;color:var(--on-ink);margin-bottom:6px}
.entry .e-by{font-family:var(--ff-body);font-style:italic;font-size:15px;color:var(--on-ink-dim)}
.entry .e-by strong{font-style:normal;font-weight:500;color:var(--on-ink)}

/* voices grid */
.voices{padding:20px 0 64px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.voice{
  text-align:left;padding:16px 15px;border-radius:12px;
  background:var(--ink-2);border:1px solid var(--ink-line);
  transition:transform .18s var(--ease),border-color .18s;
}
.voice:hover{transform:translateY(-3px);border-color:var(--brass)}
.voice .v-name{font-family:var(--ff-display);font-weight:600;font-size:18px;line-height:1.1;color:var(--on-ink);margin-bottom:6px}
.voice .v-role{font-family:var(--ff-ui);font-size:11.5px;line-height:1.4;color:var(--on-ink-dim)}
.voice .v-tags{margin-top:10px;display:flex;flex-wrap:wrap;gap:5px}
.v-tag{font-family:var(--ff-ui);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--brass-2);border:1px solid var(--brass);border-radius:999px;padding:2px 7px}
.group-label{grid-column:1/-1;font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.16em;font-size:11px;font-weight:700;color:var(--sounding);margin:14px 0 2px}
.group-label:first-child{margin-top:0}

/* ============================================================
   READING VIEW — chart paper
   ============================================================ */
#v-read{background:var(--paper);color:var(--on-paper)}
.read-body{max-width:var(--maxw);margin:0 auto;padding:30px 22px 90px}
.read-kicker{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.14em;font-size:11.5px;font-weight:600;color:var(--magenta-deep)}
.read-title{font-family:var(--ff-display);font-weight:900;font-optical-sizing:auto;font-size:clamp(30px,8vw,50px);line-height:1.02;letter-spacing:-.01em;margin:12px 0 14px;color:#1a2a30}
.read-by{font-family:var(--ff-body);font-style:italic;font-size:17px;color:var(--on-paper-dim);padding-bottom:22px;margin-bottom:6px;border-bottom:2px solid var(--paper-line)}
.read-by strong{font-style:normal;font-weight:600;color:var(--on-paper)}
.read-body p{margin:0 0 1.05em;font-size:19px;line-height:1.66}
.read-body p.lead-cap::first-letter{
  font-family:var(--ff-display);font-weight:900;float:left;
  font-size:3.5em;line-height:.78;padding:6px 10px 0 0;color:var(--magenta);
}
.read-body h3{font-family:var(--ff-ui);font-weight:700;letter-spacing:.01em;font-size:15px;text-transform:uppercase;letter-spacing:.1em;color:var(--magenta-deep);margin:2em 0 .6em}
.editor-note{font-family:var(--ff-body);font-style:italic;font-size:16px;color:var(--on-paper-dim);background:var(--paper-2);border-left:3px solid var(--brass);padding:14px 18px;margin:0 0 1.2em;border-radius:0 8px 8px 0}
.pullquote{font-family:var(--ff-display);font-weight:400;font-style:italic;font-size:clamp(22px,5.5vw,30px);line-height:1.22;color:var(--magenta-deep);margin:1.3em 0;padding-left:20px;border-left:3px solid var(--magenta)}
.callout{background:var(--ink);color:var(--on-ink);border-radius:12px;padding:20px 22px;margin:1.4em 0}
.callout .c-label{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.14em;font-size:11px;font-weight:700;color:var(--brass-2);margin-bottom:8px}
.callout p{font-size:17px;margin:0 0 .6em;color:var(--on-ink)}
.callout p:last-child{margin-bottom:0}
.read-body ul{padding-left:1.1em;margin:0 0 1.2em}
.read-body li{margin:.3em 0;font-size:17.5px}
.bio{background:var(--paper-2);border:1px solid var(--paper-line);border-radius:12px;padding:20px 22px;margin:1.4em 0}
.bio .bio-h{font-family:var(--ff-display);font-weight:600;font-size:21px;margin:0 0 8px}
.bio p{font-size:16px;margin:0 0 .6em}
figure{margin:1.6em 0}
figure img{width:100%;height:auto;border-radius:8px;filter:sepia(.18) contrast(1.02)}
figcaption{font-family:var(--ff-ui);font-size:12.5px;line-height:1.5;color:var(--on-paper-dim);margin-top:9px}
figcaption .credit{display:block;font-size:11px;letter-spacing:.04em;color:var(--sounding);margin-top:2px}

/* footer nav within reading */
.read-tail{max-width:var(--maxw);margin:0 auto;padding:0 22px 80px}
.read-tail .return{
  display:inline-flex;align-items:center;gap:8px;
  font-family:var(--ff-ui);font-weight:600;font-size:14px;
  color:var(--magenta-deep);border:1.5px solid var(--magenta);
  border-radius:999px;padding:10px 20px;
}
.read-tail .return:hover{background:var(--magenta);color:var(--paper)}

/* ============================================================
   VOICE MODAL
   ============================================================ */
.scrim{position:fixed;inset:0;z-index:60;background:rgba(8,18,23,.6);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center}
.scrim.open{display:flex}
.sheet{
  width:100%;max-width:560px;max-height:86svh;max-height:86vh;overflow:auto;
  background:var(--paper);color:var(--on-paper);
  border-radius:18px 18px 0 0;padding:26px 24px 40px;
  box-shadow:0 -10px 40px rgba(0,0,0,.4);
  animation:rise .32s var(--ease);
}
@media (prefers-reduced-motion:reduce){.sheet{animation:none}}
@keyframes rise{from{transform:translateY(40px);opacity:.4}to{transform:none;opacity:1}}
@media(min-width:620px){.scrim{align-items:center}.sheet{border-radius:18px}}
.sheet .s-close{position:absolute}
.sheet-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:4px}
.sheet h3{font-family:var(--ff-display);font-weight:900;font-size:clamp(24px,6vw,32px);line-height:1.02;margin:0}
.sheet .x{font-family:var(--ff-ui);font-size:24px;line-height:1;color:var(--on-paper-dim);padding:2px 6px}
.sheet .s-role{font-family:var(--ff-ui);font-size:13px;letter-spacing:.02em;color:var(--magenta-deep);margin:6px 0 16px;font-weight:600}
.sheet .s-bio{font-family:var(--ff-body);font-size:16.5px;line-height:1.6}
.sheet .s-bio p{margin:0 0 .7em}
.sheet .s-appears{margin-top:20px;border-top:1px solid var(--paper-line);padding-top:16px}
.sheet .s-appears .sa-k{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.14em;font-size:10.5px;font-weight:700;color:var(--sounding);margin-bottom:10px}
.sheet .sa-link{display:block;text-align:left;width:100%;font-family:var(--ff-body);font-size:16px;padding:9px 0;border-bottom:1px solid var(--paper-line);color:var(--on-paper)}
.sheet .sa-link:hover{color:var(--magenta-deep)}
.sheet .sa-link .sa-date{font-family:var(--ff-ui);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--on-paper-dim);display:block;margin-bottom:1px}

/* ============================================================
   READABILITY SCALE (all viewports) — larger type throughout
   ============================================================ */
body{font-size:19px}
.eyebrow{font-size:13px}
.masthead .sub{font-size:clamp(17px,4.8vw,21px)}
.masthead .stamp{font-size:13px}
.helper{font-size:13.5px}
.bearing .b-card{font-size:22px}
.bearing .b-count{font-size:12.5px}
.tension .pole{font-size:18px;line-height:1.3}
.tension .topic{font-size:11px}
.spine .spine-dek{font-size:16.5px}
.colophon{font-size:13px;line-height:1.75}
.index-head p{font-size:17px}
.entry .e-date{font-size:12px}
.entry .e-by{font-size:16px}
.voice .v-name{font-size:19px}
.voice .v-role{font-size:12.5px}
.read-body p{font-size:20px;line-height:1.7}
.read-body li{font-size:19px}
.editor-note{font-size:17px}
.callout p{font-size:18px}
figcaption{font-size:13px}

/* Progress Portsmouth brand lockup + diamond motif */
.pp-mark{font-family:var(--ff-ui);text-transform:uppercase;letter-spacing:.24em;font-weight:700;font-size:12px;color:var(--brass-2);text-align:center;margin-bottom:22px;display:flex;align-items:center;justify-content:center;gap:9px}
.pp-mark .d{color:var(--magenta);font-size:.9em}
.colophon .pp{color:var(--brass-2);font-weight:600}
.spine h2::before,.spine h2::after{content:"\25C6";color:var(--magenta);font-size:.7em;vertical-align:2px}
.spine h2::before{margin-right:9px}
.spine h2::after{margin-left:9px}

/* ============================================================
   DESKTOP / WIDE — horizontal hero, bigger everything
   ============================================================ */
@media (min-width:880px){
  #v-home{padding:56px 44px 92px}
  .map-veil{height:640px}
  .home-in{
    max-width:1140px;display:grid;
    grid-template-columns:1.05fr .95fr;
    grid-template-areas:"mark mark" "mast compass" "prov prov" "bridge bridge" "helper helper" "bearings bearings" "spine spine" "colophon colophon";
    column-gap:56px;row-gap:6px;align-items:center;
  }

<script>
window.CR={"meta":{"title":"Portsmouth at the Crossroads","subtitle":"Citizen Perceptions of a Good Future","published":"June 1978","heraldRange":"Portsmouth Herald · February–May 1977","org":"New Hampshire Council for the Humanities","funder":"National Endowment for the Humanities","copies":"Originally printed in an edition of 750 copies, free of charge.","host":"Progress Portsmouth","tensions":[{"id":"preserve","a":"Preserve the old town","b":"Build for the future","topic":"Historic preservation"},{"id":"tourism","a":"A town for tourists","b":"A town for working people","topic":"Tourism"},{"id":"belong","a":"Newcomers","b":"Natives","topic":"Who belongs"},{"id":"cost","a":"Beauty & aesthetics","b":"Affordability","topic":"Cost of growth"},{"id":"decide","a":"Remote government","b":"A people’s government","topic":"Who decides"}]},"sections":[{"id":"intro","kicker":"Introduction","title":"The Crossroads Project","by":"Published June 1978 &middot; NH Council for the Humanities","kind":"front","blocks":[{"t":"p","text":"The &ldquo;Portsmouth at the Crossroads Project&rdquo; has been an effort to focus the attention of interested citizens on the various views towards change in their community and on the choices with which change confronts a community."},{"t":"p","text":"With the publication of this report, the project is formally completed. This brochure contains the seven Portsmouth <em>Herald</em> articles which we commissioned to introduce the project, a summary and analysis of the viewpoints and issues discussed at the six public meetings, and a record of our sponsors, panelists, and activities during the project. We hope the brochure will be a useful and durable resource for the community."},{"t":"p","text":"Portsmouth continues to change, and its citizens continue to make decisions about that change. Many other persons in the seacoast region of New Hampshire and Maine follow these changes and decisions with more than casual interest, knowing that events in this community are also important to them."},{"t":"p","text":"The aim of this project has been to let citizens exchange views about issues confronting the city in an atmosphere free from either partisan bickering or the pressure of making immediate decisions. The project directors have sought to stimulate and guide discussion and reflection toward fundamental problems. The major part of the project depended upon the efforts of the essayists, the panelists, and perhaps above all, the citizens who attended the public meetings. This pattern is completely in accordance with the purposes of the state organization, the New Hampshire Council for the Humanities, which supported the project, and of the national effort of which it is a part, the National Endowment for the Humanities."},{"t":"p","text":"While no comprehensive &ldquo;conclusions&rdquo; are either expected or desired from a project such as this&mdash;the main aim is to help citizens understand the choices they confront, the implications of different choices, and the views of their neighbors&mdash;we cannot refrain from stressing one of the major themes which we encountered throughout the project, and which continues in evidence in Portsmouth. This is the potentially serious gap between the way of thinking and feeling about community issues by some dedicated to historic restoration and rejuvenation, beautification and cultural development, and those who regard the direction they think Portsmouth is taking as irrelevant or even destructive of &ldquo;the ordinary citizen&rsquo;s&rdquo; way of life."},{"t":"quote","text":"We detect a danger that the substitution of historic preservation, beautification, increased cultural opportunities for the overt commercialism of post&ndash;World War II America may itself be the &ldquo;purchase&rdquo; of a new life style by relatively affluent groups fleeing the urban or suburban sprawl.","attr":""},{"t":"p","text":"We recognize that the &ldquo;new Portsmouth&rdquo; is in many ways an attempt to overcome economic decline and shabbiness and to broaden cultural opportunities for all. Yet true comprehension of various &ldquo;lifestyles&rdquo; is difficult, and it is not certain that the ways of life of all citizens in Portsmouth have adequately been credited in the course of recent changes."},{"t":"p","text":"In the course of this project, we sometimes detected an interest on the part of relative newcomers in advantages which the city offers them to live the kind of life they prefer, and an assumption that this style of life is self-evidently a desirable standard. We detect a danger that the substitution of historic preservation, beautification, increased cultural opportunities (and such things as increased dining possibilities and even more street fairs!) for the overt commercialism of post&ndash;World War II America may itself be the &ldquo;purchase&rdquo; of a new life style by relatively affluent groups fleeing the urban or suburban sprawl. This would hardly be a basis for sound community development based upon a general effort to balance the variety of ways of life."},{"t":"p","text":"It has not been the intention of this project to show citizens what should be done; we would urge that there is also no way in our society of building a true community which does not stress the diversity of claims and interests in the community. There is no way of creating community sensitivity and spirit which begins by projecting upon others one&rsquo;s own way of life. To paraphrase the late Justice Felix Frankfurter: if one talks about democracy, and pretends to live in a democracy, there is little justification for short-circuiting the untidy democratic process."},{"t":"p","text":"Perhaps the strongest compliment paid the Crossroads Project was delivered by Panelist and City Councilman (now Mayor) John Wholey in the final public meeting. He expressed regret that the Portsmouth City Council had not been in attendance at all the sessions, in order to gain the benefits which the workshops apparently brought to the understanding of basic issues in Portsmouth. Accurate or not, we appreciate Mayor Wholey&rsquo;s comment!"},{"t":"p","text":"This report has been printed in an edition of 750 copies available free of charge at the Portsmouth City Hall and the Portsmouth Public Library."},{"t":"p","text":"<em>The Project Directors<br>June 1978</em>"}]},{"id":"dirs","kicker":"Front Matter","title":"The Project Directors","kind":"front","blocks":[{"t":"bio","h":"George K. Romoser","paras":["George K. Romoser is Professor of Political Science at the University of New Hampshire, where he has taught since 1967. He was Chairman of the Political Science Department from 1968 to 1971. A native of Kingston, New York, he graduated in History and Political Science from Rutgers University and received his M.A. and Ph.D. degrees in Political Science from the University of Chicago. He has also taught at Indiana University, Ohio State University, and the Connecticut College for Women, and has been Visiting Professor at the Universities of Mainz (Fulbright Professor), Mannheim, and Munich in West Germany, and the Johns Hopkins University European Center, Bologna, Italy. His special field of interest is contemporary political ideas. He has been appointed Rockefeller Fellow of The Aspen Institute for Humanistic Studies for 1978&ndash;79."]},{"t":"bio","h":"George K. Lagassa","paras":["George K. Lagassa is Assistant Professor of Political Science at the University of New Hampshire, where he has been teaching since 1974. He received his A.B. degree from Kenyon College and his Ph.D. from the State University of New York at Buffalo, where he studied as a Woodrow Wilson Fellow. Before coming to New Hampshire, he worked as a research assistant for the New York State Senate Committee on Banks. He teaches courses in Public Administration and American Public Policy, and his research interests are in Energy Policy, Environmental Politics, and Bureaucracies. This is the third New Hampshire humanities project with which he has been involved."]}]},{"id":"ack","kicker":"Front Matter","title":"Acknowledgements","kind":"front","blocks":[{"t":"p","text":"This project involved six public meetings, seven newspaper articles, twenty-four panelists, seven article writers, and two project directors. The articles and meetings were stretched over a period of thirteen weeks from February through May; prior planning began in September 1976."},{"t":"p","text":"Needless to say, the cooperation of a large number of people and organizations was essential for the success of the Crossroads Project. In addition to the panelists and article writers whose names are mentioned in the text of this report, special acknowledgement and thanks must go to the following organizations and individuals. We hasten to add that the responsibility for opinions expressed herein is solely our own and not of either the New Hampshire Council for the Humanities or our sponsoring organizations."},{"t":"p","text":"To our sponsoring organizations, whose early encouragement assured the financial support of the New Hampshire Council for the Humanities:"},{"t":"list","items":["The Portsmouth <em>Herald</em>","The Portsmouth Kiwanis Club","The Portsmouth Lions Club","The Portsmouth Rotary Club","The Greater Portsmouth Chamber of Commerce","The Portsmouth Public Library, not only for its early support, but also for use of the Dorothy Vaughan Community Meeting Room","Strawbery Banke for loan of photographs from the Patch Collection","Sherman Pridham, head librarian, whose cooperation and enthusiasm enormously helped our efforts","John LaBranche, Strawbery Banke Registrar, who gladly assisted us in preparation of the photographic exhibit","Jean Caldwell for contacting and arranging the successful fifth panel and for typing this report","The Crossroads staff, Parthenia Powell Lagassa, Donna Marie Cronin, and Rinda Roetger, who did much of the less enjoyable but most important footwork required for successful completion of the project"]},{"t":"p","text":"And to those public-spirited individuals who faithfully attended and participated in the workshops and who help to make Portsmouth a true community."},{"t":"p","text":"We thank you."},{"t":"p","text":"<em>The Project Directors</em>"}]},{"id":"a1","kicker":"Portsmouth Herald &middot; February 17, 1977","title":"Community Choice as if People Mattered","by":"By <strong>Dr. George K. Lagassa</strong>, Assistant Professor of Political Science, UNH","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This article on &ldquo;Public Policy and the Humanities: Community Choice As If People Mattered&rdquo; is the first of seven guest articles to appear in The Herald each Tuesday and Thursday for the next three weeks. The articles are part of a larger project funded by the New Hampshire Council for the Humanities and sponsored by the Greater Portsmouth Chamber of Commerce, the Kiwanis Club, the Lions Club, the Portsmouth Public Library, and the Rotary Club. The project is entitled &ldquo;Portsmouth at the Crossroads: Citizen Perceptions of a Good Future&rdquo; and will culminate in six public meetings throughout the spring and a public report in August. Dr. Lagassa is a Portsmouth resident and an assistant professor of political science at the University of New Hampshire, where he teaches courses in American Public Policy and Public Administration.)</em>"},{"t":"p","text":"As a statement of community standards, priorities, and objectives, the distinguishing characteristic of public policy is the fact that it is backed by all the power and authority of the community. Thus, public policy is established with the expectation that it will be adhered to, for if it is ignored, the transgressor faces legal sanction, community ostracism, or even violence."},{"t":"p","text":"In this light, the importance of public policy speaks for itself. It touches on our daily lives in ways too numerous to tell here, and it guides and limits our behavior with greater or lesser subtlety."},{"t":"p","text":"How are these important public standards determined? Who sets community priorities and to what ends? What are and what should be the purposes of public policy? Actually, there are a variety of answers to these questions, depending in large part upon whom you ask and under what circumstances."},{"t":"p","text":"However, examination of this variety of answers would probably reveal three distinguishable approaches to the understanding of public policy."},{"t":"h","text":"The Cynical Position"},{"t":"p","text":"The advocate of this position would argue that public policy is and can be nothing other than the will of the strongest group or individual."},{"t":"p","text":"According to this argument, there is no such thing as the common good. Rather, public policy is always and inevitably designed to serve the selfish good of a vested interest group, a corrupt politician, or a neglectful ruling class."},{"t":"callout","label":"","paras":[]},{"t":"p","text":"Thus, for example, the recent decision by the Portsmouth City Council to continue a moratorium on the construction of new apartment buildings might be interpreted by the cynic as a policy in the interest of a rather narrow group of existing property owners. In the absence of new, multi-unit, residential construction, so the argument goes, rising demand will obviously outpace the supply of available housing and rents will continue to rise."},{"t":"p","text":"From this perspective, a moratorium on apartment building construction serves the interests of the landlords, who wish only to line their already fat wallets."},{"t":"h","text":"The Rationalistic Approach"},{"t":"p","text":"A second perspective on public policy may be called the rationalistic approach. From this perspective, community priorities emerge from a systematic analysis of the facts of a community problem or issue."},{"t":"p","text":"For example, when examined from this vantage point, the moratorium on apartment building construction in Portsmouth emerges as a logical conclusion from a number of planning studies which revealed that multi-unit residential dwellings tend not to support the services they demand. Since the cost of garbage collection, sewage, water, police and school services for the residents of such dwellings exceeds the tax revenues provided by them, it goes without saying that multi-unit residential construction should be halted in Portsmouth. Somehow, the facts are always thought to speak for themselves."},{"t":"p","text":"There is, of course, a major flaw in this logic, which is that facts never really speak for themselves. Rather, human beings, with all their limits and imperfections, use facts to do their own speaking. Thus, based on the same information, there are alternatives to the complete cessation of all apartment building construction."},{"t":"p","text":"The City Council could, for example, encourage planned unit development, whereby ownership of an apartment complex carries with it the responsibility to provide the services which will be consumed by its tenants."},{"t":"p","text":"Another example of the inadequacy of the rationalistic approach pertains to the relationship between crime statistics and law enforcement policy. High crime statistics could be as much an indicator of the success of a city police department (many criminals are being apprehended) as of its failure (crime is running rampant). Depending upon the interpretation of the same statistics, policy implications can vary remarkably."},{"t":"h","text":"The Humanistic Approach"},{"t":"p","text":"A third understanding of public policy shall be called the humanistic approach. From the humanistic perspective, public policy is explicitly understood as a statement of community values and judgments and is viewed in terms of its fundamental impact on the quality of life of the citizens."},{"t":"callout","label":"","paras":[]},{"t":"p","text":"For the humanist, Portsmouth&rsquo;s moratorium on apartment building construction must be seen as the choice of a particular quality of life. It is a choice to prohibit large numbers of additional newcomers to the city and thus preserve some integrity to the existing community."},{"t":"p","text":"More specifically, it represents a decision to foster the amenities of individual privacy and the responsibilities of home ownership instead of the anonymity, architectural blandness, and standardization of apartment life and the lack of commitment to community well-being that may characterize transient, non-property owners."},{"t":"p","text":"Unfortunately, such choices usually remain implicit and are seldom brought before the community for the full discussion which their complexity deserves."},{"t":"p","text":"Despite this circumstance, it is certain that public policy finally and necessarily rests on human judgments and values. The rationalistic approach is flawed because it hides this important fact from view. The cynical approach is inadequate because it denies the existence of true community values. The humanistic perspective compensates for both of these deficiencies."},{"t":"figure","caption":"Congress Street, Portsmouth — horse-drawn fire apparatus passing the Chop House, c. 1900","credit":"Strawbery Banke, Inc., Portsmouth, NH","src":"images/img03.jpg"}]},{"id":"a2","kicker":"Portsmouth Herald &middot; February 22, 1977","title":"Old Town Sits on the Brink","by":"By <strong>Charles E. Clark</strong>, History Department, University of New Hampshire","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This article is the second in a series of seven guest articles to appear in The Herald each Tuesday and Thursday. It is part of a project entitled &ldquo;Portsmouth at the Crossroads: Citizen Perceptions of a Good Future.&rdquo; Today&rsquo;s author is a member of the History Department at the University of New Hampshire and is a local historian.)</em>"},{"t":"p","text":"Portsmouth is more than old houses."},{"t":"p","text":"It is a vibrant community, struggling with the opportunities and tragedies of today, excited and worried about tomorrow."},{"t":"p","text":"The combination of place and time could hardly be more critical. A small city with narrow streets and crowded neighborhoods sits beside a lovely, lucrative, and occasionally threatened river on the growing edge of the big population push into northern New England. And the world is about to run out of the resources customarily burned for heat and power at the same time it is becoming conscious that many of the means proposed to solve the energy crisis can pollute and kill."},{"t":"p","text":"Portsmouth, therefore, must worry about many things. It must worry about population, traffic, crime, housing, schools, fire, and disposal of waste, tankers, oil refineries, Seabrook, competition between downtown and suburban shopping centers, industrial development, city finance, the salt pile, the Clippers, keeping the Navy Yard, dealing with Newington, maintaining its fishery, and attracting tourists."},{"t":"p","text":"There has to be, in short, a lot more on the mind of everyone in Portsmouth than old houses&mdash;a proposition, no doubt, that the &ldquo;forward-looking&rdquo; among us would endorse with glee."},{"t":"p","text":"But a community seriously concerned about its well-being in the future might also look back."},{"t":"p","text":"This is true in our age more than it ever has been, because population growth, energy shortages, and the threat of pollution&mdash;serious as they are&mdash;are not the only contemporary challenges to the quality of life in American communities. Besides having all these worries, communities across the nation are in greater danger today than ever of losing track of their own identities. For that, they must look to the past. It is all we have."},{"t":"p","text":"George Lagassa&rsquo;s article in last Thursday&rsquo;s <em>Herald</em> urged the &ldquo;humanistic approach&rdquo; to making public policy. Makers of policy using such an approach would understand their work as expressing the values and judgments of the community. And they would judge a policy according to how it affects &ldquo;the quality of life of the citizens.&rdquo;"},{"t":"p","text":"One function of a historian is to remind his contemporaries that values and judgments depend for their wisdom and authenticity upon the experience of the past, and that &ldquo;quality of life&rdquo; has a good deal to do with our ability to be at home in our place and to have a healthy perspective upon our moment in time."},{"t":"p","text":"The homogenizing tendencies in our national life&mdash;national corporations, national professions, national advertising, standardized packaged merchandizing, standardized buildings, mass-produced cars and refrigerators and so on&mdash;all fight against our sense of place. And the disorienting tendencies&mdash;overwhelming amounts of &ldquo;data,&rdquo; electronic journalism (and electronic &ldquo;music&rdquo;), plastic junk, hysterical politics of right and left, &ldquo;alternate life styles,&rdquo; the crisis of the family, the assault on the liberal arts, and more&mdash;threaten to cut us off from our own history, to cast us adrift in a chartless time."},{"t":"p","text":"To have a grip on our identity as an individual, we need to know where we are and whence we came. The same is true of families, communities, and nations. This is the first step in planning for the future. We need not imitate the past, but we need to ground out plans in an understanding of who we are and where we have been&mdash;whether our intent is to change directions or stick to the old ones."},{"t":"p","text":"Portsmouth, more than most communities, has an identity of its own. The trick is to recognize it, cherish it, and use it without allowing it to stifle responsible change and adaptation."},{"t":"p","text":"One clue to Portsmouth&rsquo;s identity is, yes, its old houses."},{"t":"p","text":"These particular physical remains form a chain of continuity stretching from about 1664, which is when the Jackson House was built overlooking the North Mill Pond, to our own day. They include the unique and priceless collection of eighteenth century dwellings, both humble and aristocratic in Strawbery Banke, on Portsmouth Parade, and on waterfront streets in between. They include some of the region&rsquo;s best evidence of the graceful nationalism that was expressed in Federal architecture (especially if we include the Navy Yard in Kittery), the quest for classical inspiration and self-identification that was captured in the Greek Revival, the romantic license (and vulgar excess) of the Victorian, and stern functionalism&mdash;beautiful, ugly, or nondescript&mdash;of twentieth-century architects and builders struggling to come to terms with the new materials, new amenities, and revised philosophies of their own day."},{"t":"p","text":"Besides offering visual evidence of a continuous but changing stream of techniques and tastes, the houses of Portsmouth in combination with other evidence provide the basis for understanding the evolving social and economic life of the city. A proposed new project at Strawbery Banke, for example, would emphasize to visitors the changes in the life of the neighborhood from the middle of the eighteenth century to the middle of the twentieth. Successive generations of different occupations, different economic status, and different nationalities occupied the very same houses over a stretch of 200 years. Layers of paint and wallpaper, modifications and additions, covered fireplaces, and other physical changes over time disclose to the trained and sensitive eye the evolution of Portsmouth life in this colorful corner of the city."},{"t":"p","text":"Likewise, the physical remains of the city at large document in a somewhat less structured and scholarly way the identity of the community, which has evolved over roughly three and a half centuries."},{"t":"p","text":"Beginning as a tiny outpost of some English merchants as a fishing and trading station, Portsmouth developed rapidly in the eighteenth century as a center of shipbuilding, mercantile trade with Europe and the West Indies, sophisticated living and entertainment built upon the wealth of commerce, and provincial political power. With the expulsion of Governor John Wentworth on the eve of the American Revolution, the center of political power in the new state of New Hampshire shifted elsewhere and the glittering merchant families of extreme wealth disappeared or declined. But Portsmouth continued to flourish as a commercial port and builder of wooden ships, a role that got new emphasis and importance with the commissioning of the Navy Yard in 1800."},{"t":"p","text":"Railroads, European immigration, the increase of ocean commerce, changing technologies, and the coming of industry all worked on this riverfront community until by the close of the nineteenth century, the Navy Yard had switched from wood and sail to steel and steam, the population was much more diverse, breweries had replaced rope-walks as the most conspicuous feature of Portsmouth&rsquo;s industrial scene, and there was actually a flourishing trade in sin famous among sailors around the world."},{"t":"p","text":"Today, the city&rsquo;s problems are very different than they were in 1900."},{"t":"p","text":"But through all the decades and centuries of change, much that is essential to Portsmouth&rsquo;s character has remained."},{"t":"p","text":"There are, first, the river and the sea. This is a maritime community, dependent for its income upon fishing, commerce, and the building and repair of ships for the Navy&mdash;and dependent for survival and comfort as of now upon the import of petroleum products by sea."},{"t":"p","text":"There are, in addition, its buildings."},{"t":"p","text":"Portsmouth people have never had the habit of indiscriminately tearing down their architectural heritage. Instead, they have made the old buildings over and found new uses for them&mdash;a condominium and restaurant from a hotel, business offices from Georgian houses, a theater or an antique shop from a riverfront warehouse. And the new stands by the old, creating a texture that is at once charming, fascinating, and instructive."},{"t":"p","text":"But buildings are only external symbols, the physical evidence of what is deeper about the character and identity of Portsmouth."},{"t":"p","text":"There is here, symbolized by these buildings, a rootedness in the past, a sense of the specialness of the place, and a willingness to experiment and to build upon that past and that place."},{"t":"p","text":"In their eagerness to plan for the future, Portsmouth people ought never to lose track of who they are as a community and where they have been. Good planning comes out of a firm sense of identity. Identity comes out of history. Buildings are evidence of history, and thus ought to be cherished, preserved, and used adaptively and creatively. But they are only evidence."},{"t":"p","text":"For history, too, is more than old houses."}]},{"id":"a3","kicker":"Portsmouth Herald &middot; February 24, 1977","title":"What Role Should Local Government Play in Change?","by":"By <strong>A. Robert Thoreson</strong>, Portsmouth Planning Director","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This is the third in a series of seven guest articles to appear Tuesdays and Thursdays in The Herald. It is part of a project entitled, &ldquo;Portsmouth at the Crossroads: Citizen Perceptions of a Good Future.&rdquo; Today&rsquo;s writer is Portsmouth Planning Director A. Robert Thoreson.)</em>"},{"t":"p","text":"That Portsmouth is at the crossroads has been amply described by the two preceding articles. Both writers addressed concerns about the character of the City&rsquo;s future and its linkage with the past. Clearly implied in their discussions is the vital role that the local government, through its legislative and executive branches, plays in the shaping of change in the community."},{"t":"p","text":"One can ask rhetorically, to what extent is local government an initiator of community change. The answer is that it acts as a primary change agent in our lives. But, change is nothing more than a departure from or alteration of the existing conditions, or state of affairs as delineated in local public policies."},{"t":"p","text":"There are differing views on the extent to which local government ought to act as a change agent. A popular notion is that the government that governs least, governs best."},{"t":"p","text":"This idea has historically been popular in New Hampshire, and it is enjoying a national resurgence today because of the perceived ever presence of the &ldquo;government&rdquo; in our daily affairs."},{"t":"p","text":"Others believe that government is an essential and vital instrument for achieving social equity and for providing services that the private sector cannot provide. This view sees a more central role for the government as a change agent."},{"t":"p","text":"Public policy, the values and priorities which the local government hold, is usually expressed in two common ways&mdash;the laws which exist to achieve a given objective and the money or resources that are devoted to a given activity. A community, through its governmental leadership, is constantly adapting to changes or to perceptions of the environment around it. Changes in the laws or the budget reflect differences from past priorities."},{"t":"p","text":"In Portsmouth one can observe numerous changes in public policy that have occurred in recent years. In part these changes are a result of local perceptions and in part a result of larger national concerns. The most observable changes are those that have occurred in the physical environment and the way in which the physical environment is shaped."},{"t":"p","text":"Zoning, a power given to the community by the State, is one of the most visible local laws that is used to shape the community. Zoning is an important public policy document because it allows us as citizens to collectively express how we wish to have the physical character of the community shaped. It reflects the values of the community."},{"t":"p","text":"For example, in Portsmouth the Zoning Ordinance provides for residential districts where commercial or industrial uses are generally not allowed, thus expressing public policy on spatial organization."},{"t":"p","text":"Furthermore, the Zoning Ordinance, after amendment in 1973, provides for a strict process of evaluating the impact of all types of development before a building permit is issued. If the impact will be negative in one or more categories, a building permit may not be issued. Such procedures aren&rsquo;t necessarily used by other communities because the prevailing values in those communities have been to encourage all types of development."},{"t":"p","text":"There are other ways that the city has changed its policies in the recent past. For example, up until about six or seven years ago there was no money set aside in the budget to plant shade trees along city streets. A number of dedicated and hard working citizens pointed out the need for such a tree planting program and its benefits and volunteered to help plant the trees. The City Council, in response to this perceived need has been allocating about $5,000 per year for such an effort."},{"t":"p","text":"Similarly, the City through the efforts of the Conservation Commission and the City Council has set up an open space land purchase program. Over the past five years an Open Space Plan was developed which recommended land purchases. Over 100 acres of environmentally sensitive forest, marsh, and meadow land have been purchased to protect them from inappropriate development and to provide open areas in perpetuity for future residents of the City. These decisions represent changed priorities in the way that the local government allocated its funding."},{"t":"p","text":"Sometimes local decisions are affected by federal government programs and the priorities they express. Almost everyone is familiar with the urban renewal projects of the 1950s and 1960s in which large areas of cities were demolished to make way for new development."},{"t":"p","text":"Such projects, while having positive benefits by improving the tax base, often disrupted large and functional neighborhood areas. In the early 1970s this type of federal project was abandoned and replaced with a newer program which emphasized the conservation of neighborhoods rather than their demolition."},{"t":"p","text":"Portsmouth has been involved in both types of programs. The Vaughan Street project was an example of a clearance urban renewal project."},{"t":"p","text":"On the other hand, the Community Development Program is an example of the conservation approach. For instance, the McDonough Street project is an attempt to revitalize that area of the City by providing low-interest loans and grants to homeowners to upgrade their property, by rebuilding streets, by installing granite curbing, improving sidewalks, and building a park. This policy approach to improving the physical fabric of the City is decidedly different from the earlier clearance approach."},{"t":"p","text":"Another expression of public policy is the City&rsquo;s use of $300,000 of these federal Community Development funds to assist in constructing an industrial park. This decision opened up over 100 acres of land for industrial plants which will improve the tax base and expand job opportunities."},{"t":"p","text":"Another manifestation of change in attitude is the introduction of a new historic districting ordinance. This legislation, which has passed its first reading, would provide for a review and approval by the Historic District Commission before a building is demolished, moved, or substantially altered or before a new building is built in the historic area of the city. Such an ordinance would allow the public sector to determine the importance of the structure in the community&rsquo;s fabric."},{"t":"p","text":"This ordinance, if passed, would represent a change in governmental policy that reflects a concern for the preservation of the community&rsquo;s historic character. It would change the operating philosophy in the community in that the physical structure of the cityscape would no longer be determined by the collective incremental acts of many private decision-makers. Rather, each decision to change the City&rsquo;s historic character would be reviewed by a public citizen body."},{"t":"p","text":"In summary, local government in Portsmouth and elsewhere does act as a primary change agent in the affairs of the community through its expression of public policy. These policies are sometimes implied, sometimes explicit. Nevertheless, they can be found in the laws and spending patterns of the community and represent the values of the community."},{"t":"p","text":"When the legislative body, the City Council in Portsmouth, believes or is persuaded by the citizenry that the current public policy doesn&rsquo;t meet community needs then it is subject to change. Change may mean enactment of new laws or amendment of or repeal of existing laws. It may also mean increases or decreases of existing expenditure patterns or new expenditure patterns."},{"t":"p","text":"The citizenry either by their expressed preferences or by their lack of interest in a given issue in large measure can determine the form that a public policy change will take in the community."},{"t":"p","text":"In the absence of expressed preferences, and sometimes even in spite of them, the local legislative body will determine the community&rsquo;s public policy and the rate at which it will change."},{"t":"p","text":"Yes, Portsmouth is at a crossroads. But the local government has taken an active role in asserting its values. It has changed public policy after learning from the citizenry its community values."}]},{"id":"a4","kicker":"Portsmouth Herald &middot; March 1, 1977","title":"The Arts in Our Changing Community","by":"By <strong>Jon Kimbell</strong>, Producing Director, Theatre by the Sea","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This is another in a series of guest articles as part of a project entitled &ldquo;Portsmouth at the Crossroads: Citizen Perceptions of a Good Future.&rdquo; Today&rsquo;s article is by Jon Kimbell, producing director of Theatre by the Sea, who examines &ldquo;The Arts in Our Changing Community.&rdquo;)</em>"},{"t":"p","text":"Each person carries within the germ of all human qualities. It is the mission of the artist to examine, challenge and present these qualities to his fellow man in an attempt to set man face to face with himself. Artists are inherently social thinkers. They believe the arts are vital, not only to their personal survival, but to the health of their environment, the town they live in and the nation to which they belong. They believe that the arts contribute to and provide experiences which are conducive to the enrichment of all societies to better understand their community and their individual lives."},{"t":"p","text":"The arts have never seemed to be organic to America&rsquo;s way of life perhaps because of a national &ldquo;work ethic&rdquo; philosophy that generally has had a dollar sign as a final goal. Arts in America have historically been viewed as elitist or frivolous entertainment. We&rsquo;re a young country and have had a lot to do, and unfortunately, our human values tended to be subjugated."},{"t":"p","text":"Today we&rsquo;re beginning to take a different view and now see the arts as an integral part of society. They are not always gentle, but, then, their function is to examine. Most American artists have their roots in progressive thinking and, despite their differences, they usually have a number of things in common. Most have an irrepressible comic impulse, heightened social consciousness and a sense of moral dismay. In almost all their work there is a plea for understanding and communication. These are not easy artists to accept. They challenge the mind and occasionally affront our sense of dignity. However, their vision and perseverance is gradually changing the fabric of our lives."},{"t":"p","text":"The &ldquo;cultural boom&rdquo; is perhaps the best publicized art phenomenon of the decade. Newspapers and magazines have heralded its advent; it has been discussed on radio and television and several books have been devoted to the subject. Yet there have been a few discordant voices&mdash;skeptical commentators who have suggested that the highly touted resurgence of interest in the arts is little more than self-deception."},{"t":"p","text":"On a national level, despite the contentions of increasing grass roots interest in the arts and optimistic views that audiences include a wide range of social groups, the typical audience is drawn from an extremely narrow segment of the population, a group characterized by universally high levels of education and income."},{"t":"p","text":"Closer to home, in Portsmouth, there is strong evidence to the contrary, if the attendance at the Prescott Park Arts Festival, for example, is indeed indicative of widespread, broad-based acceptance of cultural or arts events. (Last summer, almost 90,000 people attended the Festival activities.) The success of Theatre by the Sea, the Strawbery Banke Chamber Music Festival, Strawbery Banke craftspeople, the amazing array of individual artists, the high quality arts education offered in the school system plus the number of public support groups, indicates we are experiencing a renaissance. Although the &ldquo;common man&rdquo; may be fairly uncommon among those who attend arts events nationally, in Portsmouth, he seems to be the usual participant."},{"t":"p","text":"With this revitalization in the last several years, there has indeed been an increasing awareness and utilization of the arts&mdash;and the time has come to evaluate where we are and where we may go in terms of a public policy towards a tool that will determine in large part what tomorrow will hold."},{"t":"p","text":"Portsmouth offers a fertile setting for the flourishing of the arts. With its preserved historical significance, its natural geographic beauty, its year-round community of vigorous citizenry interested in qualitative improvement, the City has become an ideal center for the arts to develop. If encouraged, they can influence to a great extent the life of the ordinary citizen."},{"t":"p","text":"Arts in general are decentralizing. Large metropolitan areas are no longer essential to arts development; in fact, a smaller city such as Portsmouth offers a high degree of involvement for an exceptionally large percentage of its people. Here we can create for ourselves, no longer relying on the expertise of outside sources. We can literally &ldquo;own&rdquo; our heritage and our future."},{"t":"p","text":"The arts are one of the few humanistic activities that transcend social boundaries of race, ethnic background, education or economic difference. Because of the universality of arts concepts or themes, they are a common denominator. An evening at Prescott Park watching a performance places old next to young, rich to poor, black to white&mdash;all joined together sometimes in groups of thousands, all enjoying an experience that transcends their individual differences and allows them to communicate through the medium on stage. This communication is the essence of community."},{"t":"p","text":"Exchanging ideas, cultures, talents, coming together to share an experience, people here have the freedom to better understand what a community means and how it can help them both collectively and individually. Still arts are a personal experience. The final good of the arts is in tiny moments of coming together with an arts experience and sharing it with someone close. I don&rsquo;t think there is a person who hasn&rsquo;t at some time looked at a singer or a dancer or a painting or a piece of sculpture and admired that marvelous sense of relating to the essence of life through sheer soaring of talent and technique."},{"t":"p","text":"On another level, in purely practical terms, the arts can offer a community at least four significant benefits. The first of these may perhaps be considered unworthy, but it is nevertheless very real&mdash;it is the prestige conferred on an area by its arts. Many persons who themselves may have no desire to attend a program of dance or music take pride in the recognition conferred on their region. They would be most unhappy if Portsmouth became known as a cultural wasteland. Imagine, if you will, Portsmouth with no craftspeople, no theatre, no music, no dance, no visual arts, and no architectural awareness."},{"t":"p","text":"A second equally materialistic set of indirect benefits which flows from the arts is the advantage that the availability of cultural activity confers on business in town; the fact that it brings customers to shops, motels, restaurants and bars both in terms of the people who live here and those who visit our area. The actual dollars from the arts are also significant. For example: the two largest arts groups in Portsmouth have a combined budget of one half million dollars annually, almost all of which is returned to the Portsmouth economy, and these figures are increasing each year. If you add to that the budgets of the many individual artists and groups, the economic impact is quite impressive. In addition to the income arts bring to the community, another substantial asset is the positive environmental change they have made in certain areas of the City. Prime examples are Strawbery Banke and Prescott Park in the South End and Theatre by the Sea on Ceres Street."},{"t":"p","text":"A third and far more appealing social contribution from the arts involves future generations. The range and scope of the arts is so varied that people who have not themselves learned to enjoy a particular art form, nevertheless feel it important that such an opportunity be available to other members or generations of their families."},{"t":"p","text":"This same phenomenon has a considerable extension to the legacy of the community as a whole. We support programs for the conservation of natural resources and for improvement of architecture, in part, because few of us are willing to take the responsibility of passing on to future generations a city whose beauty has been destroyed. There is the old saw about the man who asked the secret of the lush lawns at Versailles and was told the answer was simple: they need only be watered daily for three hundred years. Provision for the future requires nourishing the arts in the present."},{"t":"p","text":"The fourth indirect benefit by the arts is their educational contribution. If, as is generally conceded, a liberal education confers indirect and nonpriceable benefits upon the community, the same must be true of the arts. If the teaching of the humanities makes for a finer civilization, for a richer community, for a better life for everyone, this is necessarily so with the arts as well. Following our accepted policies on education, it is felt that if young people are not exposed to artistic performance or exhibition during their formative years, by the time they become adults it will be too late. The arts must be made available early, while tastes are still being formed and behavior patterns developed. To arouse a desire to create is difficult; to kill that desire is extremely easy."},{"t":"p","text":"If a public mandate can be developed through this study that supports the arts as an integral part of Portsmouth life, serious consideration must be given to the realistic financial situation. If one agrees that the arts confer general benefits on the community as a whole, in the manner described above, or in other ways, he must conclude in large part that the arts are public goods whose benefits demonstrably exceed the receipts one can hope to collect through admission prices."},{"t":"p","text":"We arrive now at the critical financial item: the gap between expenditure and earned income. To say there is a &ldquo;deficit&rdquo; implies that something has gone wrong, that costs must be cut or earnings increased so that the deficit can be eliminated. Surely the fact that earnings fall short of costs raises questions which ought not to be prejudged in the case of the arts. For just this reason, in educational institutions, where expenditures characteristically exceed tuition receipts, people do not speak of an &ldquo;operating deficit,&rdquo; nor do they think in such terms. The phrase &ldquo;income gap&rdquo; comes closer to what we mean. Arts organizations and individual artists typically operate under constant financial strain; their costs almost always exceed their earned income. Artists must be viewed as contributing members of society and as such must be compensated for their skills. The romantic illusion of living in a garret is not conducive to creativity. The financial pressures are here to stay and there are fundamental reasons for expecting the income gap to widen steadily with the passage of time."},{"t":"p","text":"For the proper perspective, the arts must be viewed as a productive activity which provides services to the community and not only as an intangible manifestation of the human spirit. In the arts, the tendency for costs to rise and for prices to lag behind is neither a matter of bad luck nor mismanagement. Rather, it is an inescapable result of the technology of our economy and the inherent nature of the time consuming hand-crafted art form. The income gap of the independent professional non-profit arts organization is small by current commercial economic standards. But for the individual group, an income gap can mean the difference between life and death, or, at the very least, between satisfactory and unacceptable standards of quality. Here is the financial problem of Portsmouth&rsquo;s arts organizations: the pressure that is imposed by the nearly universal financial gap and the threat to quality which hangs over any group that incurs a significant and protracted deficit are immediate and critical."},{"t":"p","text":"So we have the question before us as a community: value versus cost. For in no way can the arts survive without support."},{"t":"p","text":"As we ponder the issue, we must remember it is art, in the form of sculpture, paintings, mosaics, fountains and the like, that turns sterile building and public places into living things that attract people. It is the performances, concerts, workshops, exhibits and celebrations that actively involve people in the enrichment of their lives. People are, in turn, what a city needs to live."},{"t":"p","text":"Art is preeminently a peaceful and supercivilized endeavor. One that celebrates man&rsquo;s ability to think. The heart of the matter is surely that the arts can give to all of us, including those who lack expert knowledge of any of them, much of what is best in human life and enjoyment and that a community which does not put this at the disposal of those who have the liking and the capacity for it, is failing in a most important duty."},{"t":"p","text":"The past&mdash;and the present&mdash;bears within it the seeds of the future. We as a community have the opportunity to make Portsmouth a city that exemplifies the highest aspirations of the human spirit. Can we meet the challenge?"},{"t":"figure","caption":"Portsmouth waterfront — Ship House Nos. 4 and 5 with sailing vessels, c. 1890s","credit":"Strawbery Banke, Inc., Portsmouth, NH","src":"images/img04.jpg"}]},{"id":"a5","kicker":"Portsmouth Herald &middot; March 3, 1977","title":"One Taxpayer Fears a City Without People","by":"By <strong>Evelyn E. Marconi</strong>, Former City Councilman","kind":"essay","blocks":[{"t":"editor","text":"<em>(Editor&rsquo;s Note: This is another in the series &ldquo;Portsmouth at the Crossroads,&rdquo; a look by various citizens at the changes taking place in the city. Today&rsquo;s article on &ldquo;Changing Economic Fortunes of Portsmouth&mdash;A Taxpayer&rsquo;s View&rdquo; was written by former City Councilman Evelyn E. Marconi.)</em>"},{"t":"p","text":"Having been born and brought up in the same community for 50 years gives one a realistic touch with changing economics and times, on a first-hand basis."},{"t":"p","text":"I grew up in a community of working people; several busy shoeshops, a busy button factory almost in the heart of town, slightly over the hubbub of breweries, coal boats coming into the harbor at all hours of the day and night with many men waiting and hoping for employment to help unload the precious cargo of coal for distribution all over New England. I have taken walks along the waterfront and seen the fishing boats come in with all kinds of fish and shellfish."},{"t":"p","text":"I have also seen the hurry scurry of the railyards unloading their tremendous carloads, ranging from watermelons and food stuffs to brand new automobiles, to be a viable part of a wartime economy, and a busy community, with military installations affecting the whole economic picture."},{"t":"p","text":"A change began to take place, first in the lull that follows war and then the political change, from a very responsive strong mayor-type of city government to city manager form in 1947. It was felt at that time that Portsmouth needed a full-time highly skilled administrator, as we were going places! The whole manner of living in the city began to change quite noticeably. One of the first things to change was the appearance of federal money, sometimes not in real large amounts, but enough for the city, always to be committed somewhere for some thing, either matching funds or a commitment for services; after all, it was &ldquo;free&rdquo; money."},{"t":"p","text":"The more we got, the more we wanted, so away we went; urban renewal, low-rent housing, high-rise housing, double-decker parking, historical preservation, parking lots, sewage water treatment, etc., all with the everlasting FEDERAL GUIDELINES; i.e., STRINGS! and passed on to the taxpayers."},{"t":"p","text":"Some of the changes were very necessary, and long overdue, but some could have waited until the people were ready to accept them and the cost that was bound to follow; but time was of the essence, after all, if we didn&rsquo;t take it, some other city would, so let&rsquo;s be fast and first!"},{"t":"p","text":"At that time a form of &ldquo;remote&rdquo; government began to replace a &ldquo;people&rdquo; government in Portsmouth and the changes began to be more noticeable."},{"t":"p","text":"It seems there was in the &ldquo;planning&rdquo; a more sophisticated type of community, a &ldquo;cultural revolution,&rdquo; if you will. The loss of a lot of businesses in the greater Portsmouth area and a loss of jobs with them had a great effect on the business community."},{"t":"p","text":"Old established firms were either retiring or changing hands and a new trend was upon us, called &ldquo;acceptable types of businesses&rdquo;; restrictive zoning, comprehensive planning, historical preservation, parks, playgrounds, etc."},{"t":"p","text":"It seems there was an agency on every phase of our living that affected our tax base and property tax and cost of living. We have become a city known for our historical preservation and tourism, but had not promoted the development of our industrial potential or our commercial growth."},{"t":"p","text":"We have a harbor that should be booming with activity which would stimulate our economy, but is not! We should have developed our fishing fleet potential much earlier even though now our commercial fishing pier has become a reality under the state funding. Most of the waterfront has for many years been out of the reach of commercial boats because of parks, zoning changes, etc."},{"t":"p","text":"We have been so preoccupied with the aesthetics we forgot the people. We forgot that to have a real viable, healthy, community, economically sound, we have to have a coming together of all facets of people, incomes, intellect, interests, professions and see that we can all function and afford to live in this city together and within our means. This has not been done."},{"t":"p","text":"It would appear that some would make a metropolitan center out of Portsmouth in one move and then set us back by a Madison Avenue sell on our historical heritage."},{"t":"p","text":"Somewhere in between are the people who are trying desperately to survive and it is becoming increasingly difficult for them to do so. The merchants wonder where the people have gone, why the city is seemingly going the way of all &ldquo;small towns,&rdquo; succumbing to the urban sprawl."},{"t":"p","text":"We are still here, paying our taxes, our water bills, our sewer tax (soon to come), trying to understand the complexities of &ldquo;City Hall,&rdquo; while getting our ever necessary permits in order to stay in the mainstream of living, wondering, &ldquo;what ever happened to Portsmouth?&rdquo; when you could walk in off the street and go to City Hall to ask a simple question and receive an answer without having to first find the right department then the person with the proper classification to handle your question and then see if you can ask all your questions in the time allowed you."},{"t":"p","text":"Yes, we the people are still here trying to survive a system that has grown so complex and remote that one worries if at any time other than tax time the great &ldquo;computer&rdquo; at city hall does indeed really care."},{"t":"p","text":"We could have a very healthly commercial growth, a very lively industrial growth, a nice historical preservation, an aesthetically beautiful city, a busy harbor, a prosperous fishing industry, but only when all are given equal consideration, not one group over another, one with more power than another, and a blending of all ideas."},{"t":"p","text":"After all, the working man and tradesman do have their solid foundations in every community and must protect his livelihood as readily as the professional man, for it takes a little of every one of us to make it pleasant for all. Will Portsmouth be able to see the entire scene, one that can accommodate all of us, or are we going to continue to grow, not in economic growth, but further and further away from the people."},{"t":"p","text":"Yes, we are still here, somewhere! It is possible to have a real healthy, busy harbor, railroads and trucks going to and from, on one level, catering to the cargos of ocean-going vessels, which by the way save one day&rsquo;s time (which is money) by coming into Portsmouth Harbor, if we had the proper facilities."},{"t":"p","text":"On another level, automobile travel would lead to all points in New Hampshire. And still on another level pedestrian parks and walkway, bicycles, etc. This would increase our tax money and create jobs also. Why should boat building be prohibited in the South End as a means of livelihood, and encouraged and permitted for profit in the Strawbery Banke area? Double standard? Always tax monies used to benefit some areas of our city and not others. Yet, the tax money does come from all of us, to either local, state or federal government."},{"t":"p","text":"It is most difficult to explain money spent on tennis courts, handball courts, sauna baths and tree planting to a man trying to pay high food prices, high fuel prices, extremely high increases in other costs of living while trying to save enough out of his paycheck to pay his property taxes. It just doesn&rsquo;t wash, and even the most uneducated property ow
